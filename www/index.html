<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover, maximum-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#120a28">
<meta name="description" content="Dragon Merge Blast — сучасна гра 3-в-ряд з драконами, які допомагають у бою.">
<title>Dragon Merge Blast</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <canvas id="board"></canvas>

    <!-- Meta screens (populated by ui.js) -->
    <div id="screen-home" class="screen"></div>
    <div id="screen-map" class="screen hidden"></div>
    <div id="screen-collection" class="screen hidden"></div>
    <div id="screen-shop" class="screen hidden"></div>
    <div id="screen-pass" class="screen hidden"></div>
    <div id="screen-modes" class="screen hidden"></div>

    <!-- In-level screen (HUD injected by main.js) -->
    <div id="screen-game" class="screen hidden"></div>
  </div>

  <script>
    // Register the service worker for offline play (web/PWA builds only).
    if ('serviceWorker' in navigator && location.protocol.indexOf('http') === 0) {
      window.addEventListener('load', function () { navigator.serviceWorker.register('sw.js').catch(function () {}); });
    }
    // Capture the install prompt so the game can offer "Install app".
    window.addEventListener('beforeinstallprompt', function (e) { e.preventDefault(); window.__installPrompt = e; });
  </script>
  <script src="js/data.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/save.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
