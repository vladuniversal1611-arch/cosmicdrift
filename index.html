<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Lucky Vault Casino</title>
<style>
:root{
  --gold:#FFD700;--gold2:#FFA500;
  --blue:#00CFFF;--purple:#BF5FFF;--pink:#FF2D78;--green:#00FF88;
  --dark:#07071A;--card:rgba(255,255,255,.06);--border:rgba(255,255,255,.12);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--dark);
  font-family:'Segoe UI',Arial,sans-serif;color:#fff;}

canvas{position:fixed;inset:0;pointer-events:none;}
#bgC{z-index:0;}
#pC{z-index:2;}

/* ── Layout ── */
#app{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;overflow:hidden;}

/* ── Top Bar ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px 8px;
  background:rgba(7,7,26,.88);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.logo{
  font-size:18px;font-weight:900;letter-spacing:1.5px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.top-right{display:flex;gap:8px;align-items:center;}
.pill{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);
  border-radius:30px;padding:5px 11px;font-size:13px;font-weight:700;
}
.pill-icon{font-size:15px;}
.settings-btn{
  width:34px;height:34px;border-radius:50%;border:1px solid var(--border);
  background:rgba(255,255,255,.07);display:flex;align-items:center;
  justify-content:center;font-size:17px;cursor:pointer;
}

/* ── Level / XP Bar ── */
.lvbar{
  display:flex;align-items:center;gap:8px;padding:7px 14px;
  background:rgba(7,7,26,.7);flex-shrink:0;
}
.lv-badge{
  background:linear-gradient(135deg,var(--purple),var(--blue));
  border-radius:8px;padding:3px 9px;font-size:12px;font-weight:900;white-space:nowrap;
}
.xp-track{flex:1;height:7px;background:rgba(255,255,255,.1);border-radius:10px;overflow:hidden;}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--blue));
  border-radius:10px;transition:width .5s;}
.xp-label{font-size:11px;color:rgba(255,255,255,.5);white-space:nowrap;}

/* ── Jackpot Banner ── */
.jp-banner{
  text-align:center;padding:8px;flex-shrink:0;
  background:linear-gradient(90deg,#1a0535,#060d25,#1a0535);
  border-bottom:1px solid rgba(255,215,0,.2);
  animation:jpGlow 2s ease-in-out infinite alternate;
}
@keyframes jpGlow{
  from{box-shadow:inset 0 0 20px rgba(255,215,0,.06)}
  to{box-shadow:inset 0 0 40px rgba(255,215,0,.18)}
}
.jp-label{font-size:10px;color:var(--gold2);letter-spacing:2px;font-weight:600;}
.jp-value{
  font-size:22px;font-weight:900;color:var(--gold);
  text-shadow:0 0 18px rgba(255,215,0,.8);
  animation:jpPulse 1.5s ease-in-out infinite alternate;
}
@keyframes jpPulse{from{transform:scale(1)}to{transform:scale(1.04)}}

/* ── Lobby Body ── */
.lobby-body{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:14px 12px 10px;
}
.lobby-body::-webkit-scrollbar{width:0;}

/* ── Section Title ── */
.section-title{
  font-size:11px;font-weight:700;color:rgba(255,255,255,.45);
  letter-spacing:2px;text-transform:uppercase;
  margin:6px 0 10px;display:flex;align-items:center;gap:8px;
}
.section-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1);}

/* ── Game Grid ── */
.game-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:18px;}

/* ── Game Card ── */
.game-card{
  position:relative;border-radius:18px;overflow:hidden;cursor:pointer;
  aspect-ratio:1.6;transition:transform .18s,box-shadow .18s;
  -webkit-user-select:none;user-select:none;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}
.game-card:active{transform:scale(.95);}
.game-card:not(.locked):hover{transform:scale(1.02);box-shadow:0 8px 32px rgba(0,0,0,.5);}

.gc-bg{position:absolute;inset:0;}
.gc-glow{
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.12) 0%,transparent 55%);
}
.gc-border{
  position:absolute;inset:0;border-radius:18px;
  border:1.5px solid rgba(255,255,255,.15);
  pointer-events:none;
}
.gc-preview{
  position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;font-size:36px;letter-spacing:-6px;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.6));
  padding-bottom:30px;
}
.gc-bottom{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,.82));
  padding:8px 10px 9px;
}
.gc-name{font-size:12px;font-weight:800;line-height:1.25;}
.gc-type{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px;}

.gc-badge{
  position:absolute;top:8px;right:8px;
  padding:2px 7px;border-radius:10px;
  font-size:9px;font-weight:900;letter-spacing:.5px;
}

/* Locked overlay */
.gc-lock{
  position:absolute;inset:0;border-radius:18px;
  background:rgba(0,0,0,.68);backdrop-filter:blur(2px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
}
.gc-lock-icon{font-size:26px;opacity:.8;}
.gc-lock-lv{font-size:11px;font-weight:700;color:rgba(255,255,255,.6);}

/* ── Featured Card (full width) ── */
.game-card.featured{
  grid-column:1/-1;aspect-ratio:2.6;
}
.game-card.featured .gc-preview{font-size:52px;letter-spacing:-8px;}
.game-card.featured .gc-name{font-size:15px;}

/* ── Daily Bonus Card ── */
.daily-card{
  grid-column:1/-1;
  background:linear-gradient(135deg,#1a0535,#060d25);
  border:1px solid rgba(255,215,0,.25);border-radius:18px;
  padding:14px 16px;display:flex;align-items:center;gap:14px;
  cursor:pointer;transition:transform .18s;-webkit-user-select:none;user-select:none;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
}
.daily-card:active{transform:scale(.97);}
.daily-icon{font-size:44px;flex-shrink:0;animation:dailyFloat 2s ease-in-out infinite alternate;}
@keyframes dailyFloat{from{transform:translateY(0) scale(1)}to{transform:translateY(-5px) scale(1.06)}}
.daily-info{flex:1;}
.daily-title{font-size:15px;font-weight:900;color:var(--gold);}
.daily-sub{font-size:12px;color:rgba(255,255,255,.55);margin-top:3px;}
.daily-streak{
  display:flex;gap:5px;margin-top:8px;
}
.day-dot{
  width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;color:rgba(255,255,255,.4);
}
.day-dot.done{background:var(--gold);border-color:var(--gold);color:#000;}
.day-dot.today{border-color:var(--blue);box-shadow:0 0 8px var(--blue);color:#fff;}
.daily-btn{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#000;font-size:13px;font-weight:900;padding:10px 16px;
  border-radius:12px;white-space:nowrap;border:none;cursor:pointer;flex-shrink:0;
}

/* ── Bottom Nav ── */
.bottom-nav{
  display:flex;background:rgba(7,7,26,.95);backdrop-filter:blur(10px);
  border-top:1px solid var(--border);flex-shrink:0;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:9px 4px 7px;border:none;background:none;
  color:rgba(255,255,255,.45);font-size:10px;font-weight:600;gap:3px;
  cursor:pointer;transition:color .2s;-webkit-user-select:none;user-select:none;
}
.nav-icon{font-size:22px;transition:transform .2s;}
.nav-btn.active{color:var(--blue);}
.nav-btn.active .nav-icon{transform:scale(1.2);filter:drop-shadow(0 0 7px var(--blue));}
.nav-btn:active .nav-icon{transform:scale(.9);}

/* ── Toast ── */
#toast{
  position:fixed;bottom:80px;left:50%;
  transform:translateX(-50%) translateY(16px);
  background:rgba(15,15,35,.96);border:1px solid var(--border);
  border-radius:30px;padding:9px 22px;color:#fff;
  font-size:13px;font-weight:700;z-index:200;opacity:0;
  transition:all .3s;white-space:nowrap;pointer-events:none;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── Coming Soon badge pulse ── */
@keyframes badgePulse{
  0%,100%{opacity:1}50%{opacity:.6}
}
</style>
</head>
<body>

<canvas id="bgC"></canvas>
<canvas id="pC"></canvas>

<div id="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo">💎 LUCKY VAULT</div>
    <div class="top-right">
      <div class="pill"><span class="pill-icon">🪙</span><span id="coinD">10,000</span></div>
      <div class="pill"><span class="pill-icon">💎</span><span id="gemD">50</span></div>
      <div class="settings-btn" onclick="showToast('⚙️ Settings — coming soon')">⚙️</div>
    </div>
  </div>

  <!-- LEVEL BAR -->
  <div class="lvbar">
    <div class="lv-badge">LV <span id="lvD">1</span></div>
    <div class="xp-track"><div class="xp-fill" id="xpF" style="width:0%"></div></div>
    <div class="xp-label" id="xpL">0 / 100 XP</div>
  </div>

  <!-- JACKPOT BANNER -->
  <div class="jp-banner">
    <div class="jp-label">🏆 PROGRESSIVE JACKPOT</div>
    <div class="jp-value" id="jpD">1,250,000</div>
  </div>

  <!-- LOBBY BODY -->
  <div class="lobby-body">

    <!-- Daily Bonus Card -->
    <div class="daily-card" id="dailyCard" onclick="claimDaily()">
      <div class="daily-icon">🎁</div>
      <div class="daily-info">
        <div class="daily-title">Daily Bonus!</div>
        <div class="daily-sub">Come back every day for bigger rewards</div>
        <div class="daily-streak" id="dailyStreak"></div>
      </div>
      <button class="daily-btn" id="dailyBtn">CLAIM</button>
    </div>

    <!-- Slot Machines -->
    <div class="section-title">🎰 Slot Machines</div>
    <div class="game-grid" id="slotsGrid"></div>

    <!-- Table Games -->
    <div class="section-title">🃏 Table Games</div>
    <div class="game-grid" id="tableGrid"></div>

    <!-- Quick Games -->
    <div class="section-title">⚡ Quick Win</div>
    <div class="game-grid" id="quickGrid"></div>

    <div style="height:8px"></div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button class="nav-btn active" id="nb-lobby">
      <span class="nav-icon">🏠</span><span>LOBBY</span>
    </button>
    <button class="nav-btn" onclick="showToast('👤 Profile — coming soon')">
      <span class="nav-icon">👤</span><span>PROFILE</span>
    </button>
    <button class="nav-btn" onclick="showToast('🛒 Shop — coming soon')">
      <span class="nav-icon">🛒</span><span>SHOP</span>
    </button>
    <button class="nav-btn" onclick="showToast('📋 Missions — coming soon')">
      <span class="nav-icon">📋</span><span>MISSIONS</span>
    </button>
    <button class="nav-btn" onclick="showToast('🏆 Awards — coming soon')">
      <span class="nav-icon">🏆</span><span>AWARDS</span>
    </button>
  </div>

</div>

<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────
let gs = JSON.parse(localStorage.getItem('lvc_gs') || 'null') || {
  coins: 10000, gems: 50, level: 1, xp: 0,
  dailyStreak: 0, lastDaily: 0, jackpot: 1250000,
};
function save(){ localStorage.setItem('lvc_gs', JSON.stringify(gs)); }

// ── Format number ──────────────────────────────────────
function fmt(n){
  if(n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if(n >= 1000) return Math.floor(n/1000)+'K';
  return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

// ── HUD ────────────────────────────────────────────────
const LEVELS = [0,100,250,500,900,1500,2500,4000,6000,9999999];
const LV_TITLES = ['Beginner','Novice','Spinner','Gambler','High Roller','Casino Star','Diamond Hand','Vault Master','Lucky Legend','Jackpot King'];

function updateHUD(){
  document.getElementById('coinD').textContent = fmt(gs.coins);
  document.getElementById('gemD').textContent  = fmt(gs.gems);
  document.getElementById('lvD').textContent   = gs.level;
  document.getElementById('jpD').textContent   = fmt(gs.jackpot);
  const cur = gs.xp - LEVELS[gs.level-1];
  const max = LEVELS[gs.level] - LEVELS[gs.level-1];
  const pct = Math.min(100, Math.floor(cur/max*100));
  document.getElementById('xpF').style.width = pct + '%';
  document.getElementById('xpL').textContent = cur + ' / ' + max + ' XP';
  renderStreak();
}

// ── Daily Bonus ────────────────────────────────────────
const DAILY_REWARDS = [2000,3000,5000,7500,10000,15000,25000];

function renderStreak(){
  const c = document.getElementById('dailyStreak');
  c.innerHTML = '';
  for(let i=1;i<=7;i++){
    const d = document.createElement('div');
    d.className = 'day-dot' + (i < gs.dailyStreak ? ' done' : i === gs.dailyStreak ? ' today' : '');
    d.textContent = i;
    c.appendChild(d);
  }
}

function claimDaily(){
  const now = Date.now();
  const lastDate = new Date(gs.lastDaily).toDateString();
  const today    = new Date(now).toDateString();
  if(lastDate === today){
    showToast('⏰ Come back tomorrow for your next bonus!');
    return;
  }
  gs.lastDaily = now;
  gs.dailyStreak = Math.min((gs.dailyStreak||0) + 1, 7);
  const reward = DAILY_REWARDS[gs.dailyStreak - 1];
  gs.coins += reward;
  spawnCoins(innerWidth/2, innerHeight/2, 35);
  showToast('🎁 Daily Bonus! +' + fmt(reward) + ' 🪙');
  updateHUD();
  save();
  document.getElementById('dailyBtn').textContent = '✓ CLAIMED';
  document.getElementById('dailyBtn').style.opacity = '.5';
}

// ── Game Definitions ───────────────────────────────────
const GAME_DEFS = {
  slots: [
    {
      id:'vault', name:'Lucky Vault', sub:'Classic 5×3 Slots',
      emoji:'7️⃣🔔💎', badge:'HOT', badgeColor:'#FF2D78',
      grad:'linear-gradient(145deg,#1a0535 0%,#0a1a3a 100%)',
      glow:'rgba(0,207,255,.35)', minLv:1, featured:true,
    },
    {
      id:'egypt', name:'Egyptian Gold', sub:'5×3 Egypt Theme',
      emoji:'🔱👁️🦅', badge:'NEW', badgeColor:'#FFB800',
      grad:'linear-gradient(145deg,#2a1200 0%,#1a0800 100%)',
      glow:'rgba(255,184,0,.3)', minLv:1,
    },
    {
      id:'space', name:'Space Galaxy', sub:'5×3 Space Theme',
      emoji:'🚀👽🛸', badge:'VIP', badgeColor:'#BF5FFF',
      grad:'linear-gradient(145deg,#020215 0%,#0a0235 100%)',
      glow:'rgba(191,95,255,.3)', minLv:3,
    },
    {
      id:'fruits', name:'Fruit Fiesta', sub:'3×3 Classic Fruits',
      emoji:'🍒🍋🍉', badge:null, badgeColor:null,
      grad:'linear-gradient(145deg,#1a0a00 0%,#0a1500 100%)',
      glow:'rgba(0,255,136,.25)', minLv:5,
    },
  ],
  table: [
    {
      id:'roulette', name:'Roulette', sub:'European Roulette',
      emoji:'🎡🔴⚫', badge:'SOON', badgeColor:'#00FF88',
      grad:'linear-gradient(145deg,#051a05 0%,#030f03 100%)',
      glow:'rgba(0,255,136,.3)', minLv:1, coming:true,
    },
    {
      id:'blackjack', name:'Blackjack', sub:'Classic 21',
      emoji:'🃏♠️♥️', badge:'SOON', badgeColor:'#FFFFFF',
      grad:'linear-gradient(145deg,#111 0%,#1a1a1a 100%)',
      glow:'rgba(255,255,255,.2)', minLv:1, coming:true,
    },
  ],
  quick: [
    {
      id:'wheel', name:'Lucky Wheel', sub:'Daily Prize Wheel',
      emoji:'🎡💫⭐', badge:'FREE', badgeColor:'#FFD700',
      grad:'linear-gradient(145deg,#1a1000 0%,#0a0800 100%)',
      glow:'rgba(255,215,0,.3)', minLv:1, coming:true,
    },
    {
      id:'scratch', name:'Scratch Cards', sub:'Instant Win',
      emoji:'🎫💎🃏', badge:'SOON', badgeColor:'#00CFFF',
      grad:'linear-gradient(145deg,#001a10 0%,#000f08 100%)',
      glow:'rgba(0,207,255,.3)', minLv:1, coming:true,
    },
  ],
};

// ── Build Lobby ────────────────────────────────────────
function makeCard(g){
  const locked = gs.level < g.minLv;
  const div = document.createElement('div');
  div.className = 'game-card' + (g.featured?' featured':'');
  div.style.background = g.grad;
  if(g.glow) div.style.boxShadow = `0 6px 24px ${g.glow}, 0 2px 8px rgba(0,0,0,.5)`;

  div.innerHTML = `
    <div class="gc-bg"></div>
    <div class="gc-preview">${g.emoji}</div>
    <div class="gc-glow"></div>
    <div class="gc-border"></div>
    <div class="gc-bottom">
      <div class="gc-name">${g.name}</div>
      <div class="gc-type">${g.sub}</div>
    </div>
    ${g.badge ? `<div class="gc-badge" style="background:${g.badgeColor};color:${g.badgeColor==='#FFFFFF'?'#000':'#fff'}">${g.badge}</div>` : ''}
    ${locked ? `<div class="gc-lock"><div class="gc-lock-icon">🔒</div><div class="gc-lock-lv">Unlock at Level ${g.minLv}</div></div>` : ''}
  `;

  if(!locked){
    div.addEventListener('click', () => {
      if(g.coming) showToast('🚧 ' + g.name + ' — Coming Soon!');
      else showToast('🎰 Opening ' + g.name + '...');
    });
  }
  return div;
}

function buildLobby(){
  const sg = document.getElementById('slotsGrid');
  const tg = document.getElementById('tableGrid');
  const qg = document.getElementById('quickGrid');
  GAME_DEFS.slots.forEach(g => sg.appendChild(makeCard(g)));
  GAME_DEFS.table.forEach(g => tg.appendChild(makeCard(g)));
  GAME_DEFS.quick.forEach(g => qg.appendChild(makeCard(g)));
  // Check daily btn
  const lastDate = new Date(gs.lastDaily).toDateString();
  if(lastDate === new Date().toDateString()){
    document.getElementById('dailyBtn').textContent = '✓ CLAIMED';
    document.getElementById('dailyBtn').style.opacity = '.5';
  }
}

// ── Jackpot ticker ─────────────────────────────────────
setInterval(()=>{
  gs.jackpot += Math.floor(Math.random()*80+30);
  document.getElementById('jpD').textContent = fmt(gs.jackpot);
}, 2800);

// ── Toast ──────────────────────────────────────────────
let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

// ── Background Canvas ──────────────────────────────────
const bgC = document.getElementById('bgC');
const bgX = bgC.getContext('2d');

const STARS = Array.from({length:90}, ()=>({
  x:Math.random(), y:Math.random(),
  r:Math.random()*1.6+.4,
  a:Math.random(), sp:Math.random()*.003+.001,
}));
const ORBS = [
  {x:.15,y:.25,r:.28,c:'191,95,255',sp:.00035},
  {x:.85,y:.65,r:.22,c:'0,207,255', sp:.00055},
  {x:.5, y:.85,r:.20,c:'255,45,120',sp:.00045},
  {x:.7, y:.1, r:.16,c:'255,184,0', sp:.00065},
];
let bgT = 0;

function drawBg(){
  const W=bgC.width, H=bgC.height;
  bgX.fillStyle='#07071A';
  bgX.fillRect(0,0,W,H);
  ORBS.forEach(o=>{
    const rx = o.x*W + Math.sin(bgT*o.sp*900)*W*.09;
    const ry = o.y*H + Math.cos(bgT*o.sp*900)*H*.09;
    const gr = bgX.createRadialGradient(rx,ry,0,rx,ry,o.r*W);
    gr.addColorStop(0,`rgba(${o.c},.14)`);
    gr.addColorStop(1,`rgba(${o.c},0)`);
    bgX.fillStyle=gr;
    bgX.fillRect(0,0,W,H);
  });
  STARS.forEach(s=>{
    s.a+=s.sp; if(s.a>1)s.a=0;
    const alpha = Math.sin(s.a*Math.PI)*0.75;
    bgX.beginPath();
    bgX.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
    bgX.fillStyle=`rgba(255,255,255,${alpha})`;
    bgX.fill();
  });
  bgT++;
}

// ── Particle Coins ─────────────────────────────────────
const pC2 = document.getElementById('pC');
const pX2 = pC2.getContext('2d');
let parts = [];

function spawnCoins(x,y,n=20){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=Math.random()*9+3;
    parts.push({
      x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
      life:1, decay:Math.random()*.02+.015,
      sz:Math.random()*12+6, rot:Math.random()*Math.PI*2,
      rs:(Math.random()-.5)*.25,
    });
  }
}

function drawParts(){
  pX2.clearRect(0,0,pC2.width,pC2.height);
  parts = parts.filter(p=>p.life>0);
  parts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=.22;
    p.life-=p.decay; p.rot+=p.rs;
    pX2.save();
    pX2.globalAlpha=Math.max(0,p.life);
    pX2.translate(p.x,p.y); pX2.rotate(p.rot);
    pX2.font=p.sz+'px serif';
    pX2.textAlign='center'; pX2.textBaseline='middle';
    pX2.fillText('🪙',0,0);
    pX2.restore();
  });
}

// ── Resize ─────────────────────────────────────────────
function resize(){
  bgC.width=pC2.width=innerWidth;
  bgC.height=pC2.height=innerHeight;
}
resize();
addEventListener('resize',resize);

// ── Main Loop ──────────────────────────────────────────
let lastF=0;
function loop(ts){
  if(ts-lastF>16){ drawBg(); drawParts(); lastF=ts; }
  requestAnimationFrame(loop);
}

// ── Init ───────────────────────────────────────────────
buildLobby();
updateHUD();
requestAnimationFrame(loop);
</script>
</body>
</html>
