<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Stack Tower</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #06060f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .frame {
      position: relative;
      width: 390px;
      height: 680px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.08),
        0 24px 70px rgba(0,0,0,0.7),
        0 0 60px rgba(66,165,245,0.12);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: pointer;
      touch-action: none;
    }

    /* Responsive: fill viewport on small screens */
    @media (max-width: 420px) {
      .frame {
        width: 100vw;
        height: 100dvh;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <div class="frame">
    <canvas id="c"></canvas>
  </div>

  <script src="StackTower.js"></script>
  <script>
    (function () {
      const canvas = document.getElementById('c');

      const game = new StackTower(canvas, {
        onCoinsUpdate(total) {
          // Hook into virtual pet wallet here:
          // e.g. petGame.addCoins(delta)
          console.log('[StackTower] coins total:', total);
        },
        onGameOver(result) {
          console.log('[StackTower] game over', result);
          // result.exit === true  → player pressed Exit
          // Integration example:
          //   petGame.awardCoins(result.coinsEarned);
          //   if (result.exit) showPetScreen();
        },
      });

      // Expose for debugging / pet-game integration
      window.stackTower = game;
    })();
  </script>
</body>
</html>
