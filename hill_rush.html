<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#5cb85c">
<title>Hill Rush</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;user-select:none;
  background:#000;display:flex;justify-content:center;align-items:center;
  font-family:'Arial Rounded MT Bold',Arial,sans-serif}
#wrap{position:relative;width:400px;height:700px;overflow:hidden}
/* Only the GAME canvas is full-screen absolute */
#gc{display:block;position:absolute;top:0;left:0;width:400px;height:700px}

/* ── HUD ──────────────────────────────────────────────── */
#hud{position:absolute;top:0;left:0;right:0;z-index:10;pointer-events:none;
  display:none;padding:10px 14px 8px;
  background:linear-gradient(180deg,rgba(0,0,0,.5) 0%,transparent 100%)}
#hudRow{display:flex;justify-content:space-between;align-items:center}
.hpill{display:flex;flex-direction:column;align-items:center}
.hlbl{font-size:8px;letter-spacing:3px;color:rgba(255,255,255,.5);text-transform:uppercase}
.hval{font-size:20px;font-weight:900;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.6);line-height:1.1}
.hval.gold{color:#ffe500}
#fuelBox{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:0 12px}
#fuelLbl{font-size:8px;letter-spacing:3px;color:rgba(255,255,255,.45)}
#fuelTrack{width:100%;height:10px;background:rgba(0,0,0,.4);border-radius:5px;
  border:1px solid rgba(255,255,255,.15);overflow:hidden}
#fuelBar{height:100%;border-radius:5px;background:linear-gradient(90deg,#66bb6a,#2e7d32);
  transition:width .12s,background .25s}

/* ── CONTROLS ─────────────────────────────────────────── */
#controls{position:absolute;bottom:0;left:0;right:0;height:130px;display:none;
  z-index:20;pointer-events:all}
.cbtn{flex:1;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:5px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;transition:background .08s}
#cBrake{float:left;width:50%;background:rgba(220,50,50,.14);
  border-right:1px solid rgba(255,255,255,.06)}
#cGas  {float:right;width:50%;background:rgba(50,200,80,.14)}
#cBrake.act{background:rgba(220,50,50,.38)}
#cGas.act  {background:rgba(50,200,80,.36)}
.cicon{font-size:40px;opacity:.55}
.clbl{font-size:9px;letter-spacing:4px;color:rgba(255,255,255,.3);text-transform:uppercase}

/* ── PAUSE BUTTON ─────────────────────────────────────── */
#pauseBtn{position:absolute;top:10px;left:50%;transform:translateX(-50%);
  z-index:15;pointer-events:all;display:none;
  background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.15);
  border-radius:9px;color:rgba(255,255,255,.7);font-size:17px;
  padding:5px 14px;cursor:pointer;font-family:inherit}

/* ── OVERLAY SCREENS ──────────────────────────────────── */
.ovl{position:absolute;inset:0;z-index:30;display:none;flex-direction:column;
  align-items:center;justify-content:flex-start;pointer-events:all;overflow-y:auto}
.ovl.on{display:flex}

/* Menu */
#menuOvl{background:linear-gradient(180deg,#56CCF2 0%,#a8e063 60%,#66bb6a 100%);
  justify-content:center;align-items:center}
.mlogo{text-align:center;margin-bottom:14px}
.mlogo-t{font-size:56px;font-weight:900;color:#fff;
  text-shadow:0 5px 0 #1a6614,0 0 40px rgba(80,200,40,.35);letter-spacing:3px}
.mlogo-s{font-size:11px;letter-spacing:6px;color:rgba(255,255,255,.6);margin-top:4px}
/* Menu hills decoration */
#menuHills{position:absolute;bottom:0;left:0;right:0;height:220px;pointer-events:none}
.gbtn{border:none;outline:none;cursor:pointer;font-family:inherit;font-weight:900;
  letter-spacing:2px;text-transform:uppercase;transition:transform .08s}
.gbtn:active{transform:scale(.93)!important}
.btn-play{display:block;background:linear-gradient(180deg,#56e04a,#2ea829);
  color:#fff;font-size:24px;padding:18px 0;border-radius:20px;width:240px;
  text-align:center;box-shadow:0 7px 0 #1a6614,0 0 24px rgba(60,200,40,.35);
  margin-bottom:16px}
.btn-med{display:block;background:rgba(0,0,0,.22);color:#fff;font-size:13px;
  padding:13px 0;border-radius:14px;width:200px;text-align:center;
  border:2px solid rgba(255,255,255,.3);margin-bottom:10px}
.mbest{font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.5);margin-top:10px}

/* Garage / Level select shared */
.darkovl{background:linear-gradient(180deg,#1a1a2e,#16213e)}
.stitle{font-size:10px;letter-spacing:5px;color:rgba(255,255,255,.4);
  margin:22px 0 8px;text-transform:uppercase}
.scoins{font-size:18px;font-weight:900;color:#ffe500;margin-bottom:14px}
/* vehicle cards */
.vrow{display:flex;gap:9px;padding:0 14px 6px;overflow-x:auto;
  width:100%;margin-bottom:12px}
.vrow::-webkit-scrollbar{display:none}
.vcard{flex-shrink:0;width:96px;background:rgba(255,255,255,.06);
  border:2px solid rgba(255,255,255,.1);border-radius:14px;
  padding:8px 5px;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:4px;transition:all .13s}
.vcard.sel{border-color:#56e04a;background:rgba(86,224,74,.1)}
.vcard.lck{opacity:.45}
.vcname{font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.55);text-transform:uppercase}
.vcprice{font-size:11px;color:#ffe500;font-weight:900}
/* upgrades */
.ugrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 14px;width:100%}
.ucard{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:12px;padding:9px 7px;cursor:pointer;display:flex;
  flex-direction:column;align-items:center;gap:4px;transition:transform .1s}
.ucard:active{transform:scale(.94)}
.uicon{font-size:22px}
.uname{font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.5);
  text-transform:uppercase;text-align:center}
.udots{display:flex;gap:3px}
.udot{width:14px;height:5px;border-radius:3px;background:rgba(255,255,255,.1)}
.udot.on{background:#56e04a;box-shadow:0 0 5px rgba(86,224,74,.65)}
.ucost{font-size:12px;font-weight:900;color:#ffe500}

/* Level cards */
.lcard{display:flex;align-items:center;gap:12px;padding:13px 15px;
  background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.1);
  border-radius:13px;cursor:pointer;width:calc(100% - 28px);transition:all .13s}
.lcard.sel{border-color:#56e04a}
.lcard.lck{opacity:.45}
.lemoji{font-size:28px}
.lname{font-size:14px;font-weight:900;color:#fff}
.ldesc{font-size:9px;color:rgba(255,255,255,.4);margin-top:2px}

/* Pause */
#pauseOvl{background:rgba(0,0,0,.72);backdrop-filter:blur(3px);
  justify-content:center;align-items:center}
.pausetitle{font-size:32px;font-weight:900;color:#fff;letter-spacing:4px;margin-bottom:28px}

/* Game Over */
#goOvl{background:rgba(0,0,0,.78);justify-content:center;align-items:center}
.gocard{background:rgba(15,20,40,.92);border:1px solid rgba(255,255,255,.12);
  border-radius:22px;padding:26px 26px;display:flex;flex-direction:column;
  align-items:center;gap:11px;width:300px}
.go-over{font-size:10px;letter-spacing:5px;color:rgba(255,255,255,.4)}
.go-rsn{font-size:21px;font-weight:900;color:#ff5252;letter-spacing:1px}
.gohr{width:100%;height:1px;background:rgba(255,255,255,.1)}
.gostats{display:flex;justify-content:space-around;width:100%}
.gostat{display:flex;flex-direction:column;align-items:center;gap:3px}
.goslbl{font-size:8px;letter-spacing:3px;color:rgba(255,255,255,.35)}
.gosval{font-size:26px;font-weight:900;color:#fff}
.gosval.g{color:#ffe500}
.gobest{font-size:10px;color:rgba(255,180,0,.7);letter-spacing:2px}

/* Notifications */
#toast{position:absolute;top:88px;left:50%;transform:translateX(-50%);
  z-index:50;background:rgba(0,0,0,.82);color:#fff;padding:9px 18px;
  border-radius:10px;font-size:11px;letter-spacing:2px;pointer-events:none;
  opacity:0;transition:opacity .2s;white-space:nowrap}
#mile{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:50;pointer-events:none;opacity:0;transition:opacity .3s;text-align:center}
.mile-n{font-size:42px;font-weight:900;color:#fff;text-shadow:0 0 30px rgba(255,220,50,.8)}
.mile-s{font-size:9px;letter-spacing:5px;color:rgba(255,255,255,.5);margin-top:4px}
.cpop{position:absolute;z-index:45;pointer-events:none;font-size:15px;font-weight:900;
  color:#ffe500;text-shadow:0 0 8px rgba(255,200,0,.7);
  animation:cpop .9s ease-out forwards}
@keyframes cpop{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-55px)}}
</style>
</head>
<body>
<div id="wrap">

<!-- ── MAP SELECT ── -->
<div class="ovl darkovl" id="mapOvl">

</div>

<!-- ── PAUSE ── -->
<div class="ovl" id="pauseOvl">
  <div class="pausetitle">PAUSED</div>
  <button class="gbtn btn-play" id="btnResume" style="font-size:20px;padding:16px 0;margin-bottom:12px">▶ RESUME</button>
  <button class="gbtn btn-med" id="btnPMenu">🏠 MENU</button>
</div>

<!-- ── GAME OVER ── -->
<div class="ovl" id="goOvl">
  <div class="gocard">
    <div class="go-over">GAME OVER</div>

      <div class="gostat"><div class="goslbl">DISTANCE</div><div class="gosval" id="goDist">0 m</div></div>
      <div class="gostat"><div class="goslbl">COINS</div><div class="gosval g" id="goCoins">0</div></div>
    </div>
    <div class="gobest" id="goBest"></div>

  </div>
</div>

</div><!-- #wrap -->

<script>
'use strict';
// ── polyfill roundRect ───────────────────────────────────
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(+r||0,Math.abs(w)/2,Math.abs(h)/2);
    this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);
    this.arcTo(x+w,y,x+w,y+r,r);this.lineTo(x+w,y+h-r);
    this.arcTo(x+w,y+h,x+w-r,y+h,r);this.lineTo(x+r,y+h);
    this.arcTo(x,y+h,x,y+h-r,r);this.lineTo(x,y+r);
    this.arcTo(x,y,x+r,y,r);this.closePath();return this;
  };
}

// ── sizing ───────────────────────────────────────────────
const W=400,H=700;
const wrap=document.getElementById('wrap');
const gc=document.getElementById('gc');
const ctx=gc.getContext('2d');

function resize(){
  const s=Math.min(innerWidth/W,innerHeight/H);
  wrap.style.transform=`scale(${s})`;
  wrap.style.transformOrigin='center center';
  // Center the wrap
  wrap.style.position='absolute';
  wrap.style.left=((innerWidth-W)/2)+'px';
  wrap.style.top=((innerHeight-H)/2)+'px';
}
window.addEventListener('resize',resize); resize();

// ── seeded rng ───────────────────────────────────────────
function mbrng(seed){return()=>{seed=seed+0x6D2B79F5|0;let t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296};}

// ── audio ────────────────────────────────────────────────
let AC=null;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();return AC;}
let eOsc=null,eGain=null;
function beep(f,d,v=.28,tp='sine'){try{const c=getAC(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=tp;o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
function startEng(){try{const c=getAC();if(eOsc){eOsc.stop();eOsc=null;}eOsc=c.createOscillator();eGain=c.createGain();const ws=c.createWaveShaper(),cu=new Float32Array(256);for(let i=0;i<256;i++){const x=i*2/256-1;cu[i]=x<0?-Math.pow(-x,.55):Math.pow(x,.55);}ws.curve=cu;eOsc.type='sawtooth';eOsc.frequency.value=82;eGain.gain.value=.045;eOsc.connect(ws);ws.connect(eGain);eGain.connect(c.destination);eOsc.start();}catch(e){}}
function setRPM(r){if(!eOsc)return;try{const c=getAC();eOsc.frequency.setTargetAtTime(60+r*230,c.currentTime,.08);eGain.gain.setTargetAtTime(.04+r*.05,c.currentTime,.08);}catch(e){}}
function stopEng(){try{if(eOsc){eOsc.stop();eOsc=null;}}catch(e){}}
const sfxCoin=()=>beep(920,.09,.16);
const sfxFuel=()=>{beep(440,.14,.2,'triangle');setTimeout(()=>beep(550,.14,.18,'triangle'),95);};
const sfxCrash=()=>{beep(100,.5,.5,'sawtooth');setTimeout(()=>beep(65,.35,.3,'sawtooth'),55);};
const sfxBtn=()=>beep(660,.07,.16,'triangle');
const sfxBuy=()=>{beep(440,.08,.2);setTimeout(()=>beep(660,.08,.22),90);setTimeout(()=>beep(880,.14,.25),210);};
const sfxMile=()=>{beep(660,.1,.28);setTimeout(()=>beep(880,.12,.3),110);setTimeout(()=>beep(1100,.18,.28),255);};

const UPGRADES=[
  {id:'engine',name:'ENGINE',    icon:'⚡',max:6,base:80, mult:1.65},
  {id:'susp',  name:'SUSPENSION',icon:'🔧',max:6,base:60, mult:1.55},

// ── particles ─────────────────────────────────────────────
const PARTS=[];
function emit(x,y,n,o){for(let i=0;i<n;i++){const a=(o.a||0)+(Math.random()-.5)*(o.sp||6.28);const s=(o.s||2)*(.5+Math.random()*.5);PARTS.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-(o.up||0),life:1,dec:o.d||.03,r:o.r||3,col:o.c||'#fff',g:o.g||.07});}}
function tickParts(){for(let i=PARTS.length-1;i>=0;i--){const p=PARTS[i];p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.vx*=.96;p.life-=p.dec;if(p.life<=0)PARTS.splice(i,1);}}
function drawParts(cx,cy){for(const p of PARTS){ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x-cx,p.y-cy,p.r*(0.5+p.life*.5),0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;}

// ── terrain ───────────────────────────────────────────────
const SEG=55;
class Terrain{
  constructor(env,seed){this.env=env;this.r=mbrng(seed||Math.random()*99999|0);this.pts=[];this.objs=[];this.decs=[];this.gx=0;this._gen(W*4);}
  _gen(to){
    const r=this.r,e=this.env;
    let x=this.gx,y=x===0?H*.56:this.pts[this.pts.length-1].y;
    if(x===0){for(let i=0;i<=7;i++)this.pts.push({x:i*SEG,y});x=7*SEG;}
    while(x<to){
      const seg=SEG*(.75+r()*.9);
      const amp=e.hillAmp*(.25+r()*.9)*e.rough;
      const ny=Math.max(H*.18,Math.min(H*.86,y+(r()>.45?1:-1)*amp));
      for(let i=1;i<=5;i++){const t=i/5;this.pts.push({x:x+seg*t,y:y+(ny-y)*(t*t*(3-2*t))+(r()-.5)*5*e.rough});}
      const mx=x+seg*.5,my=y+(ny-y)*.5;
      if(mx>220){
        if(r()<.38){const c=1+Math.floor(r()*3);for(let j=0;j<c;j++)this.objs.push({t:'coin',x:mx+(j-1)*24,y:my-34-r()*28,col:false});}
        if(r()<.07)this.objs.push({t:'fuel',x:mx,y:my-46,col:false});
        if(r()<.42)this.decs.push({fn:e.treeFn,x:mx+(r()-.5)*26,y:my,s:11+r()*16});
      }
      x+=seg;y=ny;
    }
    this.gx=x;
  }
  getY(wx){
    const p=this.pts;
    if(wx<=p[0].x)return p[0].y;
    if(wx>=p[p.length-1].x)this._gen(wx+W*4);
    let lo=0,hi=p.length-1;
    while(hi-lo>1){const m=lo+hi>>1;p[m].x<=wx?lo=m:hi=m;}
    const d=p[hi].x-p[lo].x;
    return d<.001?p[lo].y:p[lo].y+(p[hi].y-p[lo].y)*(wx-p[lo].x)/d;
  }
  getNorm(wx){const y0=this.getY(wx-2),y1=this.getY(wx+2),l=Math.hypot(4,y1-y0);return{nx:-(y1-y0)/l,ny:4/l};}
  ensure(to){if(to>this.gx-W)this._gen(to+W*4);}
}

// ── vehicle physics ───────────────────────────────────────
class Car{
  constructor(vd,upg,env,sx,sy){
    this.vd=vd;this.env=env;
    const eM=1+upg.engine*.2,sM=1+upg.susp*.17,tM=1+upg.tires*.13,fM=1+upg.fuel*.22;
    this.engP=vd.eng*eM;
    this.sk=.3*sM; this.dk=.58*sM;
    this.fric=env.friction+tM*.03;
    this.fuelMax=vd.fuelMax*fM; this.fuel=this.fuelMax;
    this.mass=vd.mass;
    this.has4wd=upg.fwd>0;
    this.turboL=upg.turbo; this.turboQ=0;
    this.wr=vd.wr;
    this.axF=vd.axF; this.axR=vd.axR;
    this.srest=this.wr+12+sM*5;
    // Body
    this.bx=sx;this.by=sy;this.bvx=0;this.bvy=0;this.bang=0;
    // Front wheel
    this.fx=sx+this.axF;this.fy=sy+this.srest;this.fvx=0;this.fvy=0;this.fang=0;this.fG=false;
    // Rear wheel
    this.rx=sx+this.axR;this.ry=sy+this.srest;this.rvx=0;this.rvy=0;this.rang=0;this.rG=false;
    this.dist=0;this.sx=sx;
    this.crashed=false;this.rsn='';this.noFuel=false;this.dead=false;this.flipT=0;this.et=0;
  }
  step(terrain,gas,brake){
    if(this.dead)return;
    this.et++;
    const g=this.env.gravity;
    if(gas&&this.fuel>0)this.fuel=Math.max(0,this.fuel-.016);
    if(this.fuel<=0)this.noFuel=true;
    if(this.turboL>0){this.turboQ=gas&&this.fuel>0?Math.min(1,this.turboQ+.003*this.turboL):this.turboQ*.975;}
    const boost=this.turboQ>.7?1+this.turboL*.18:1;
    const g2=this.env.gravity;
    // Gravity
    this.bvy+=g2/this.mass; this.fvy+=g2; this.rvy+=g2;
    // Spring forces
    const c=Math.cos(this.bang),s=Math.sin(this.bang);
    this._spr(this.bx+this.axF*c, this.by+this.axF*s,'f');
    this._spr(this.bx+this.axR*c, this.by+this.axR*s,'r');
    // Engine
    const ok=this.fuel>0;
    if(ok&&gas&&this.rG){this.rvx+=this.engP*boost;this.rang+=this.engP*boost/this.wr;}
    if(ok&&gas&&this.has4wd&&this.fG){this.fvx+=this.engP*.45*boost;this.fang+=this.engP*.45*boost/this.wr;}
    if(brake){
      if(this.rG){this.rvx-=this.engP*.52;this.rang-=this.engP*.52/this.wr;this.rvx*=.85;}
      if(this.fG&&this.has4wd){this.fvx-=this.engP*.28;this.fang-=this.engP*.28/this.wr;}
      else if(this.fG){this.fvx*=.8;this.fang*=.8;}
    }
    // Drag + speed cap
    this.bvx*=.992;this.bvy*=.9998;this.fvx*=.992;this.rvx*=.992;
    const maxSpd=18+this.engP*6;if(Math.abs(this.bvx)>maxSpd)this.bvx*=.92;
    // Ground
    this._gnd(terrain,'f');this._gnd(terrain,'r');
    // Integrate
    this.bx+=this.bvx;this.by+=this.bvy;
    this.fx+=this.fvx;this.fy+=this.fvy;
    this.rx+=this.rvx;this.ry+=this.rvy;
    this.fang+=this.fvx/this.wr;this.rang+=this.rvx/this.wr;
    // Body angle from wheels
    const ta=Math.atan2(this.fy-this.ry,this.fx-this.rx);
    this.bang+=(ta-this.bang)*.18;
    // Prevent body clipping ground
    const bg=terrain.getY(this.bx);
    if(this.by>bg-16){this.by=bg-16;if(this.bvy>0)this.bvy*=-.15;}
    this.dist=Math.max(0,this.bx-this.sx);
    // Flip
    if(Math.abs(this.bang)>Math.PI*.72){if(++this.flipT>55){this.crashed=true;this.rsn='FLIPPED!';}}
    else this.flipT=Math.max(0,this.flipT-2);
  }
  _spr(ax,ay,sw){
    const wx=sw==='f'?this.fx:this.rx,wy=sw==='f'?this.fy:this.ry;
    const wvx=sw==='f'?this.fvx:this.rvx,wvy=sw==='f'?this.fvy:this.rvy;
    const dx=ax-wx,dy=ay-wy,dist=Math.hypot(dx,dy)||.001;
    const nx=dx/dist,ny=dy/dist;
    const comp=this.srest-dist;
    const rv=(this.bvx-wvx)*nx+(this.bvy-wvy)*ny;
    const f=(comp*this.sk+rv*this.dk);
    const fx=f*nx,fy=f*ny;
    if(sw==='f'){this.fvx+=fx;this.fvy+=fy;}else{this.rvx+=fx;this.rvy+=fy;}
    this.bvx-=fx/this.mass;this.bvy-=fy/this.mass;
  }
  _gnd(terrain,sw){
    let wx=sw==='f'?this.fx:this.rx,wy=sw==='f'?this.fy:this.ry;
    let wvx=sw==='f'?this.fvx:this.rvx,wvy=sw==='f'?this.fvy:this.rvy;
    const ty=terrain.getY(wx);
    if(wy+this.wr>ty){
      wy=ty-this.wr;
      const nm=terrain.getNorm(wx);
      const dot=wvx*nm.nx+wvy*nm.ny;
      if(dot<0){wvx-=1.25*dot*nm.nx;wvy-=1.25*dot*nm.ny;}
      wvx*=this.fric;wvy*=this.fric;
      const dot2=wvx*nm.nx+wvy*nm.ny;if(dot2<0){wvx-=dot2*nm.nx;wvy-=dot2*nm.ny;}
      if(sw==='f'){this.fG=true;this.fy=wy;this.fvx=wvx;this.fvy=wvy;}
      else{this.rG=true;this.ry=wy;this.rvx=wvx;this.rvy=wvy;}
    }else{if(sw==='f')this.fG=false;else this.rG=false;}
  }
}

// ── drawing helpers ───────────────────────────────────────
function drawWheel(c,x,y,r,ang,vd){
  // Shadow
  c.save();c.globalAlpha=.22;c.fillStyle='#000';c.beginPath();c.ellipse(x+4,y+5,r,r*.5,0,0,Math.PI*2);c.fill();c.restore();
  // Tyre
  c.fillStyle=vd.tyr;c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.fill();
  c.strokeStyle='rgba(50,50,50,.7)';c.lineWidth=r*.17;c.beginPath();c.arc(x,y,r*.9,0,Math.PI*2);c.stroke();
  // Tread
  for(let i=0;i<8;i++){const a=ang+i*Math.PI/4;c.strokeStyle='rgba(30,30,30,.55)';c.lineWidth=r*.09;c.beginPath();c.moveTo(x+Math.cos(a)*r*.75,y+Math.sin(a)*r*.75);c.lineTo(x+Math.cos(a)*r*.92,y+Math.sin(a)*r*.92);c.stroke();}
  // Rim
  c.fillStyle=vd.rim;c.beginPath();c.arc(x,y,r*.52,0,Math.PI*2);c.fill();
  c.strokeStyle=vd.rim;c.lineWidth=r*.1;
  for(let i=0;i<5;i++){const a=ang+i*Math.PI*.4;c.beginPath();c.moveTo(x+Math.cos(a)*r*.12,y+Math.sin(a)*r*.12);c.lineTo(x+Math.cos(a)*r*.48,y+Math.sin(a)*r*.48);c.stroke();}
  c.fillStyle=vd.hub;c.beginPath();c.arc(x,y,r*.13,0,Math.PI*2);c.fill();
  c.fillStyle='rgba(255,255,255,.55)';c.beginPath();c.arc(x-r*.04,y-r*.04,r*.05,0,Math.PI*2);c.fill();
}

function drawSusp(c,bx,by,bang,off,wx,wy){
  const bd=10;
  const ax=bx+off*Math.cos(bang)-bd*Math.sin(bang),ay=by+off*Math.sin(bang)+bd*Math.cos(bang);
  c.strokeStyle='rgba(70,70,70,.8)';c.lineWidth=3.5;c.lineCap='round';
  c.beginPath();c.moveTo(ax,ay);c.lineTo(wx,wy);c.stroke();
  // Coil
  const dx=wx-ax,dy=wy-ay,len=Math.hypot(dx,dy)||1;
  const nx=dx/len,ny=dy/len,px=-ny,py=nx,n=4,amp=3.5;
  c.strokeStyle='rgba(100,100,100,.5)';c.lineWidth=1.2;c.beginPath();c.moveTo(ax,ay);
  for(let i=1;i<=n*2;i++){const t=i/(n*2),sgn=i%2?1:-1;c.lineTo(ax+dx*t+px*amp*sgn,ay+dy*t+py*amp*sgn);}
  c.lineTo(wx,wy);c.stroke();
}

function drawBody(c,vd,bang,ox,oy){
  c.save();c.translate(ox,oy);c.rotate(bang);
  const w=vd.cw,h=vd.ch,hw=w/2;
  if(vd.id==='bike'){_bike(c,vd,hw,h);}
  else if(vd.id==='monster'){_monster(c,vd,hw,h);}
  else if(vd.id==='pickup'){_pickup(c,vd,hw,h);}
  else{_jeep(c,vd,hw,h);}
  c.restore();
}

function treeSnow(c,x,y,s){treePine(c,x,y,s);c.fillStyle='rgba(240,248,255,.85)';c.beginPath();c.moveTo(x,y-s*1.8);c.lineTo(x-s*.15,y-s*1.1);c.lineTo(x+s*.15,y-s*1.1);c.fill();c.beginPath();c.moveTo(x,y-s*1.1);c.lineTo(x-s*.28,y-s*.6);c.lineTo(x+s*.28,y-s*.6);c.fill();}
function cactus(c,x,y,s){c.fillStyle='#4caf50';c.fillRect(x-s*.14,y-s,s*.28,s);c.fillRect(x-s*.5,y-s*.65,s*.38,s*.12);c.fillRect(x+s*.12,y-s*.52,s*.38,s*.12);c.fillRect(x-s*.5,y-s*.65,s*.12,s*.26);c.fillRect(x+s*.38,y-s*.52,s*.12,s*.22);}
function crater(c,x,y,s){c.fillStyle='rgba(0,0,0,.4)';c.beginPath();c.ellipse(x,y,s*.7,s*.24,0,0,Math.PI*2);c.fill();c.strokeStyle='rgba(80,80,80,.5)';c.lineWidth=1.5;c.beginPath();c.ellipse(x,y,s*.7,s*.24,0,0,Math.PI*2);c.stroke();}
function rock(c,x,y,s,env){
  c.fillStyle=env.id==='arctic'?'#b0bec5':env.id==='moon'?'#555':'#78909c';
  c.beginPath();c.moveTo(x-s*.5,y);c.lineTo(x-s*.6,y-s*.4);c.lineTo(x-s*.1,y-s*.7);c.lineTo(x+s*.3,y-s*.5);c.lineTo(x+s*.6,y-s*.1);c.closePath();c.fill();
  c.fillStyle='rgba(255,255,255,.1)';c.beginPath();c.moveTo(x-s*.1,y-s*.7);c.lineTo(x+s*.3,y-s*.5);c.lineTo(x,y-s*.5);c.closePath();c.fill();
}
const DECOFNS={treeGreen,treePine,treeSnow,cactus,crater};

// ── clouds ────────────────────────────────────────────────
function makeClouds(){
  const r=mbrng(42),cls=[];
  for(let i=0;i<9;i++){
    const b=[],n=2+Math.floor(r()*3);
    for(let j=0;j<n;j++)b.push({dx:(j-.5)*28,dy:(r()-.3)*12,r:16+r()*18});
    cls.push({x:r()*W*3,y:H*.06+r()*H*.18,sp:.12+r()*.22,a:.45+r()*.4,b});
  }
  return cls;
}

// ── background render ─────────────────────────────────────
function renderBG(env,cx,cy,clouds){
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,env.sky[0]);g.addColorStop(1,env.sky[1]);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  if(env.id==='moon'){
    ctx.fillStyle='rgba(255,255,255,.8)';const sr=mbrng(77);
    for(let i=0;i<90;i++){ctx.beginPath();ctx.arc(sr()*W,sr()*H*.75,sr()*1.2+.3,0,Math.PI*2);ctx.fill();}
    const eg=ctx.createRadialGradient(W*.78,H*.1,0,W*.78,H*.1,28);
    eg.addColorStop(0,'#4488cc');eg.addColorStop(.7,'#2255aa');eg.addColorStop(1,'#112244');
    ctx.fillStyle=eg;ctx.beginPath();ctx.arc(W*.78,H*.1,28,0,Math.PI*2);ctx.fill();
  } else {
    if(env.id!=='moon'&&clouds){
      ctx.fillStyle=env.cloud;
      for(const cl of clouds){
        const lx=((cl.x-cx*cl.sp)%W+W)%W;
        ctx.save();ctx.globalAlpha=cl.a;
        for(const b of cl.b){ctx.beginPath();ctx.arc(lx+b.dx,cl.y-cy*.06+b.dy,b.r,0,Math.PI*2);ctx.fill();}
        ctx.restore();
      }
    }
    const sg=ctx.createRadialGradient(W*.82,H*.08,0,W*.82,H*.08,52);
    sg.addColorStop(0,'rgba(255,240,160,.95)');sg.addColorStop(.55,'rgba(255,210,80,.5)');sg.addColorStop(1,'rgba(255,180,40,0)');
    ctx.fillStyle=sg;ctx.beginPath();ctx.arc(W*.82,H*.08,52,0,Math.PI*2);ctx.fill();
  }
  for(let li=0;li<3;li++){
    const spd=.11+li*.15,ox=((-(cx*spd))%W+W)%W;
    ctx.fillStyle=env.bg[li];ctx.beginPath();
    for(let px=0;px<=W+80;px+=32){const hx=ox+px,hy=H*(0.36+li*.1)-Math.sin(hx*.008+li*1.2)*H*(0.14-li*.02)-Math.sin(hx*.018+li*2.1)*H*.05;px===0?ctx.moveTo(hx,hy):ctx.lineTo(hx,hy);}
    ctx.lineTo(W+100,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();
  }
}

function renderTerrain(terrain,env,cx,cy){
  const pts=terrain.pts;
  let si=0;for(let i=0;i<pts.length-1;i++){if(pts[i].x-cx>-SEG*2){si=Math.max(0,i-2);break;}}
  const dg=ctx.createLinearGradient(0,H*.35,0,H);dg.addColorStop(0,env.gMid);dg.addColorStop(1,env.gDeep);
  ctx.beginPath();ctx.moveTo(pts[si].x-cx,H+60);
  for(let i=si;i<pts.length&&pts[i].x-cx<W+SEG*2;i++)ctx.lineTo(pts[i].x-cx,pts[i].y-cy);
  ctx.lineTo(W+100,H+60);ctx.closePath();ctx.fillStyle=dg;ctx.fill();
  // Top layer
  ctx.beginPath();
  for(let i=si;i<pts.length&&pts[i].x-cx<W+SEG*2;i++){const px=pts[i].x-cx,py=pts[i].y-cy;i===si?ctx.moveTo(px,py):ctx.lineTo(px,py);}
  ctx.strokeStyle=env.gTop;ctx.lineWidth=10;ctx.lineJoin='round';ctx.stroke();
  ctx.strokeStyle=env.gLine;ctx.lineWidth=3;ctx.lineCap='round';
  ctx.beginPath();
  for(let i=si;i<pts.length&&pts[i].x-cx<W+SEG*2;i++){const px=pts[i].x-cx,py=pts[i].y-cy;i===si?ctx.moveTo(px,py):ctx.lineTo(px,py);}
  ctx.stroke();
  // Decorations
  for(const d of terrain.decs){
    const dx=d.x-cx,dy=d.y-cy;if(dx<-60||dx>W+60)continue;
    const fn=DECOFNS[d.fn];
    if(fn)fn(ctx,dx,dy,d.s);else rock(ctx,dx,dy,d.s,env);
  }
}

function renderObjs(terrain,cx,cy,t){
  for(const o of terrain.objs){
    if(o.col)continue;
    const ox=o.x-cx,oy=o.y-cy;if(ox<-30||ox>W+30)continue;
    if(o.t==='coin'){
      const p=.93+Math.sin(t*.006+o.x*.05)*.07,r=9*p;
      const cg=ctx.createRadialGradient(ox-2,oy-2,0,ox,oy,r);
      cg.addColorStop(0,'#fff8a0');cg.addColorStop(.5,'#ffe500');cg.addColorStop(1,'#cc8800');
      ctx.fillStyle=cg;ctx.beginPath();ctx.arc(ox,oy,r,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#aa7700';ctx.lineWidth=2;ctx.beginPath();ctx.arc(ox,oy,r,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle='rgba(170,110,0,.8)';ctx.font=`bold ${r*1.1|0}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('$',ox,oy+.5);
    }else{
      ctx.fillStyle='#f44336';ctx.beginPath();ctx.roundRect(ox-9,oy-20,18,20,3);ctx.fill();
      ctx.fillStyle='#b71c1c';ctx.beginPath();ctx.roundRect(ox-5,oy-24,10,6,2);ctx.fill();
      ctx.fillStyle='#ef9a9a';ctx.beginPath();ctx.roundRect(ox-6,oy-17,5,5,1);ctx.fill();
      ctx.strokeStyle='#880000';ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(ox-9,oy-20,18,20,3);ctx.stroke();
      const fg=ctx.createRadialGradient(ox,oy,0,ox,oy,22);fg.addColorStop(0,'rgba(255,100,0,.25)');fg.addColorStop(1,'transparent');
      ctx.fillStyle=fg;ctx.beginPath();ctx.arc(ox,oy,22,0,Math.PI*2);ctx.fill();
    }
  }
}

function renderCar(car,cx,cy){
  const bx=car.bx-cx,by=car.by-cy;
  const fx=car.fx-cx,fy=car.fy-cy;
  const rx=car.rx-cx,ry=car.ry-cy;
  drawWheel(ctx,rx,ry,car.wr,car.rang,car.vd);
  drawSusp(ctx,bx,by,car.bang,car.axR,rx,ry);
  drawBody(ctx,car.vd,car.bang,bx,by);
  drawSusp(ctx,bx,by,car.bang,car.axF,fx,fy);
  drawWheel(ctx,fx,fy,car.wr,car.fang,car.vd);
  if(car.turboQ>.7){const tg=ctx.createRadialGradient(bx,by,0,bx,by,52);tg.addColorStop(0,'rgba(0,200,255,.22)');tg.addColorStop(1,'transparent');ctx.fillStyle=tg;ctx.beginPath();ctx.arc(bx,by,52,0,Math.PI*2);ctx.fill();}
}

function renderVignette(){
  const vg=ctx.createRadialGradient(W/2,H/2,H*.3,W/2,H/2,H*.82);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.38)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
}

// ── menu car preview ─────────────────────────────────────
function drawMenuCar(cnv){
  const c=cnv.getContext('2d');c.clearRect(0,0,cnv.width,cnv.height);
  const vd=VEHICLES.find(v=>v.id===sv.selV)||VEHICLES[0];
  c.save();c.translate(cnv.width/2,cnv.height*.8);c.scale(.76,.76);
  const wr=vd.wr,sy=wr+10;
  drawWheel(c,-Math.abs(vd.axR),sy,wr,0,vd);drawWheel(c,vd.axF,sy,wr,0,vd);
  drawSusp(c,0,0,0,vd.axF,vd.axF,sy);drawSusp(c,0,0,0,vd.axR,-Math.abs(vd.axR),sy);
  drawBody(c,vd,0,0,0);
  c.restore();
}
function drawGaragePrev(cnv){
  const c=cnv.getContext('2d');c.clearRect(0,0,cnv.width,cnv.height);
  const vd=VEHICLES.find(v=>v.id===sv.selV)||VEHICLES[0];
  c.save();c.translate(cnv.width/2,cnv.height*.85);c.scale(.78,.78);
  const wr=vd.wr,sy=wr+10;
  drawWheel(c,-Math.abs(vd.axR),sy,wr,0,vd);drawWheel(c,vd.axF,sy,wr,0,vd);
  drawSusp(c,0,0,0,vd.axF,vd.axF,sy);drawSusp(c,0,0,0,vd.axR,-Math.abs(vd.axR),sy);
  drawBody(c,vd,0,0,0);
  c.restore();
}

function showOvl(id){
  document.querySelectorAll('.ovl').forEach(o=>o.classList.remove('on'));

  const ingame=id===null;
  document.getElementById('hud').style.display=ingame?'block':'none';
  document.getElementById('controls').style.display=ingame?'flex':'none';
  document.getElementById('pauseBtn').style.display=ingame?'block':'none';
}

let STATE='menu',car=null,terrain=null,clouds=null,camX=0,camY=0;
let gas=false,brake=false,paused=false,sessionCoins=0,fT=0,lastT=0,raf=null;
let nextMile=0;
const MILES=[100,250,500,1000,2000,3500,5000,7500,10000];

function initMenu(){
  STATE='menu';stopEng();if(raf){cancelAnimationFrame(raf);raf=null;}
  showOvl('menuOvl');
  document.getElementById('bestTxt').textContent='BEST: '+(sv.best|0)+' m';

function initGarage(){
  STATE='garage';showOvl('garageOvl');refreshGarage();
}

function refreshGarage(){
  document.getElementById('gCoins').textContent='🪙 '+sv.coins;
  // Vehicle row
  const vr=document.getElementById('vRow');vr.innerHTML='';
  for(const vd of VEHICLES){
    const vs2=sv.vs[vd.id];
    const card=document.createElement('div');
    card.className='vcard'+(sv.selV===vd.id?' sel':'')+(vs2.locked?' lck':'');
    // mini preview canvas
    const mc=document.createElement('canvas');mc.width=90;mc.height=48;mc.style.display='block';
    const c2=mc.getContext('2d');c2.save();c2.translate(45,40);c2.scale(.48,.48);
    const sy=vd.wr+8;
    drawWheel(c2,-Math.abs(vd.axR),sy,vd.wr,0,vd);drawWheel(c2,vd.axF,sy,vd.wr,0,vd);
    drawBody(c2,vd,0,0,0);
    c2.restore();
    card.appendChild(mc);
    const nm=document.createElement('div');nm.className='vcname';nm.textContent=vd.name;card.appendChild(nm);
    if(vs2.locked){const pr=document.createElement('div');pr.className='vcprice';pr.textContent='🪙'+vd.price;card.appendChild(pr);}
    card.addEventListener('click',()=>{
      if(vs2.locked){
        if(sv.coins>=vd.price){sv.coins-=vd.price;sv.vs[vd.id].locked=false;sv.selV=vd.id;saveSv();sfxBuy();toast(vd.name+' unlocked!');refreshGarage();}
        else{toast('Need 🪙'+vd.price);beep(220,.2,.3,'sawtooth');}
      }else{sv.selV=vd.id;saveSv();sfxBtn();refreshGarage();}
    });
    vr.appendChild(card);
  }
  drawGaragePrev(document.getElementById('gPrev'));
  // Upgrades
  const vs2=sv.vs[sv.selV];
  const ug=document.getElementById('ugGrid');ug.innerHTML='';
  for(const up of UPGRADES){
    const lv=vs2[up.id]||0,mx=lv>=up.max;
    const cost=Math.round(up.base*Math.pow(up.mult,lv));
    const cd=document.createElement('div');cd.className='ucard';
    let dots='';for(let i=0;i<up.max;i++)dots+=`<div class="udot${i<lv?' on':''}"></div>`;
    cd.innerHTML=`<div class="uicon">${up.icon}</div><div class="uname">${up.name}</div><div class="udots">${dots}</div>${mx?'<div class="ucost" style="font-size:9px;color:rgba(255,200,0,.4)">MAX</div>':`<div class="ucost" style="opacity:${sv.coins>=cost&&!vs2.locked?.9:.35}">${vs2.locked?'🔒':'🪙'+cost}</div>`}`;
    if(!mx&&!vs2.locked)cd.addEventListener('click',()=>{const c2=Math.round(up.base*Math.pow(up.mult,sv.vs[sv.selV][up.id]||0));if(sv.coins>=c2){sv.coins-=c2;sv.vs[sv.selV][up.id]=(sv.vs[sv.selV][up.id]||0)+1;saveSv();sfxBuy();refreshGarage();}else{toast('Need 🪙'+c2);beep(220,.2,.3,'sawtooth');}});
    ug.appendChild(cd);
  }
}

function initMapSel(){
  STATE='map';showOvl('mapOvl');
  const el=document.getElementById('mapCards');el.innerHTML='';
  for(const e of ENVS){

// ── game ─────────────────────────────────────────────────
function startGame(){
  if(raf){cancelAnimationFrame(raf);raf=null;}
  STATE='game';sessionCoins=0;fT=0;gas=false;brake=false;paused=false;nextMile=0;
  PARTS.length=0;
  const env=ENVS.find(e=>e.id===sv.selE)||ENVS[0];
  const vd=VEHICLES.find(v=>v.id===sv.selV)||VEHICLES[0];
  const vs2=sv.vs[vd.id];
  const upg={engine:vs2.engine||0,susp:vs2.susp||0,fuel:vs2.fuel||0,tires:vs2.tires||0,fwd:vs2.fwd||0,turbo:vs2.turbo||0};
  terrain=new Terrain(env,Math.random()*99999|0);
  clouds=makeClouds();
  const sy=terrain.getY(180)-vd.wr-70;
  car=new Car(vd,upg,env,180,sy);
  camX=car.bx-W*.35;camY=car.by-H*.6;
  showOvl(null);
  document.getElementById('pauseOvl').classList.remove('on');
  document.getElementById('goOvl').classList.remove('on');
  startEng();lastT=performance.now();
  raf=requestAnimationFrame(loop);
}

function loop(now){
  if(STATE!=='game'||paused)return;
  raf=requestAnimationFrame(loop);
  const dt=Math.min((now-lastT)/1e3,.05);lastT=now;fT+=dt;
  const steps=Math.max(1,Math.round(dt*60));
  for(let i=0;i<steps;i++){if(!car.dead)car.step(terrain,gas,brake);tickParts();}
  if(car.noFuel&&!car.crashed&&!car.dead){car.crashed=true;car.rsn='OUT OF FUEL!';}
  // Exhaust
  if(!car.dead&&gas&&car.et%4===0){
    const co=Math.cos(car.bang),si=Math.sin(car.bang);
    emit(car.bx+car.axR*co,car.by+car.axR*si,2,{a:car.bang+Math.PI+(Math.random()-.5)*.5,s:2+Math.random()*1.8,d:.04+Math.random()*.02,r:3+Math.random()*3,c:car.turboQ>.7?'rgba(0,200,255,.7)':`rgba(${160+Math.random()*40|0},${100+Math.random()*30|0},60,.7)`,g:.04,up:.5});
  }
  if((car.rG||car.fG)&&Math.abs(car.rvx)>2.4&&car.et%5===0){
    const wx=car.rG?car.rx:car.fx,wy=car.rG?car.ry:car.fy;
    emit(wx,wy+car.wr,2,{a:-Math.PI/2+(Math.random()-.5)*.9,s:.8+Math.random()*1.4,d:.055,r:2+Math.random()*3,c:car.env.gTop,g:-.01,up:1});
  }
  // Collect
  const pts2=[{x:car.fx,y:car.fy},{x:car.rx,y:car.ry},{x:car.bx,y:car.by}];
  for(const o of terrain.objs){
    if(o.col)continue;
    for(const b of pts2){
      const d2=(b.x-o.x)**2+(b.y-o.y)**2,rad=o.t==='coin'?10+car.wr*.4:12+car.wr*.55;
      if(d2<rad*rad){
        o.col=true;
        if(o.t==='coin'){
          sessionCoins++;sfxCoin();
          const pop=document.createElement('div');pop.className='cpop';
          pop.style.left=(o.x-camX-12)+'px';pop.style.top=(o.y-camY-18)+'px';pop.textContent='+1';
          wrap.appendChild(pop);setTimeout(()=>pop.remove(),920);
          emit(o.x,o.y,5,{s:2.2,d:.055,r:3,c:'#ffe500',g:.05,up:1});
        }else{
          car.fuel=Math.min(car.fuelMax,car.fuel+car.fuelMax*.5);car.noFuel=false;sfxFuel();toast('⛽ FUEL +50%');
          emit(o.x,o.y,7,{s:2.5,d:.04,r:3,c:'#ff6600',g:.03,up:1.5});
        }
        break;
      }
    }
  }
  // Camera
  camX+=(car.bx-W*.35-camX)*.1;
  camY+=(car.by-H*.6-camY)*.1;
  terrain.ensure(camX+W*2);
  // Milestone
  const d=car.dist|0;
  if(nextMile<MILES.length&&d>=MILES[nextMile]){showMile(MILES[nextMile]);nextMile++;ENVS.forEach(e=>{if(d>=e.unlockM&&!sv.envs[e.id]){sv.envs[e.id]=true;saveSv();setTimeout(()=>toast('🗺 '+e.name+' UNLOCKED!'),1800);}});}
  // Engine RPM
  setRPM(Math.min(1,Math.abs(car.bvx)/14+(gas?.26:0)));
  // HUD
  document.getElementById('hDist').textContent=d+' m';
  document.getElementById('hCoins').textContent=sessionCoins;
  const fp=(car.fuel/car.fuelMax)*100;
  const fb=document.getElementById('fuelBar');
  fb.style.width=fp+'%';
  fb.style.background=fp<20?'linear-gradient(90deg,#f44336,#b71c1c)':fp<40?'linear-gradient(90deg,#ff9800,#e65100)':'linear-gradient(90deg,#66bb6a,#2e7d32)';
  // Draw
  ctx.clearRect(0,0,W,H);
  renderBG(car.env,camX,camY,clouds);
  renderTerrain(terrain,car.env,camX,camY);
  renderObjs(terrain,camX,camY,now);
  drawParts(camX,camY);
  if(!car.dead)renderCar(car,camX,camY);
  renderVignette();
  // Crash
  if(car.crashed&&!car.dead){
    car.dead=true;stopEng();sfxCrash();
    emit(car.bx,car.by,18,{s:4.5,d:.022,r:6,c:'#ff3300',g:.1,up:3});
    emit(car.bx,car.by,12,{s:3,d:.028,r:4,c:'#ff9800',g:.08,up:2});
    setTimeout(()=>endGame(car.rsn||'CRASHED!'),900);
  }
}

function endGame(rsn){
  STATE='gameover';if(raf){cancelAnimationFrame(raf);raf=null;}
  const d=car.dist|0;sv.coins+=sessionCoins;const nb=d>sv.best;if(nb)sv.best=d;
  ENVS.forEach(e=>{if(sv.best>=e.unlockM)sv.envs[e.id]=true;});saveSv();
  document.getElementById('goOvl').classList.add('on');
  document.getElementById('goRsn').textContent=rsn;
  document.getElementById('goDist').textContent=d+' m';
  document.getElementById('goCoins').textContent=sessionCoins;
  document.getElementById('goBest').textContent=nb?'🏆 NEW BEST: '+d+' m!':'BEST: '+sv.best+' m';
}

// ── pause ─────────────────────────────────────────────────
function togglePause(){
  if(STATE!=='game')return;
  paused=!paused;
  document.getElementById('pauseOvl').classList.toggle('on',paused);
  if(!paused){stopEng();startEng();lastT=performance.now();raf=requestAnimationFrame(loop);}
  else stopEng();
}

const cG=document.getElementById('cGas'),cB=document.getElementById('cBrake');
function setG(v){gas=v;cG.classList.toggle('act',v);}
function setB(v){brake=v;cB.classList.toggle('act',v);}
cG.addEventListener('touchstart',e=>{e.preventDefault();setG(true);getAC();},{passive:false});
cG.addEventListener('touchend',  e=>{e.preventDefault();setG(false);},{passive:false});
cG.addEventListener('touchcancel',e=>{e.preventDefault();setG(false);},{passive:false});
cB.addEventListener('touchstart',e=>{e.preventDefault();setB(true);getAC();},{passive:false});
cB.addEventListener('touchend',  e=>{e.preventDefault();setB(false);},{passive:false});
cB.addEventListener('touchcancel',e=>{e.preventDefault();setB(false);},{passive:false});
cG.addEventListener('mousedown',()=>setG(true));cG.addEventListener('mouseup',()=>setG(false));cG.addEventListener('mouseleave',()=>setG(false));
cB.addEventListener('mousedown',()=>setB(true));cB.addEventListener('mouseup',()=>setB(false));cB.addEventListener('mouseleave',()=>setB(false));
window.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='d'){setG(true);getAC();}if(e.key==='ArrowLeft'||e.key==='a'){setB(true);getAC();}if(e.key==='Escape'||e.key==='p')togglePause();});
window.addEventListener('keyup',e=>{if(e.key==='ArrowRight'||e.key==='d')setG(false);if(e.key==='ArrowLeft'||e.key==='a')setB(false);});

// ── buttons ───────────────────────────────────────────────
document.getElementById('btnPlay').onclick=()=>{sfxBtn();getAC();startGame();};
document.getElementById('btnGarage').onclick=()=>{sfxBtn();initGarage();};
document.getElementById('btnMapSel').onclick=()=>{sfxBtn();initMapSel();};
document.getElementById('btnGBack').onclick=()=>{sfxBtn();initMenu();};
document.getElementById('btnMapBack').onclick=()=>{sfxBtn();initMenu();};
document.getElementById('btnResume').onclick=togglePause;
document.getElementById('btnPMenu').onclick=()=>{paused=false;stopEng();if(raf){cancelAnimationFrame(raf);raf=null;}initMenu();};
document.getElementById('btnRetry').onclick=()=>{sfxBtn();startGame();};
document.getElementById('btnGoMenu').onclick=()=>{sfxBtn();initMenu();};
document.getElementById('pauseBtn').onclick=togglePause;

// ── service worker ────────────────────────────────────────
if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));

// ── boot ─────────────────────────────────────────────────
initMenu();
</script>
</body>
</html>
