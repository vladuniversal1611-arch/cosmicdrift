<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hill Rush">
<meta name="application-name" content="Hill Rush">
<meta name="theme-color" content="#1B5E20">
<meta name="description" content="Hill Rush — physics-based hill climbing racer. Collect coins, upgrade your vehicle, conquer impossible terrain!">
<meta name="keywords" content="hill climb,racing,physics,arcade,mobile game">
<meta property="og:title" content="Hill Rush">
<meta property="og:description" content="Physics-based hill climbing racer">
<meta property="og:type" content="game">
<link rel="manifest" href="data:application/json;charset=utf-8,%7B%22name%22%3A%22Hill+Rush%22%2C%22short_name%22%3A%22HillRush%22%2C%22description%22%3A%22Physics-based+hill+climbing+racer%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22orientation%22%3A%22landscape%22%2C%22background_color%22%3A%22%231B5E20%22%2C%22theme_color%22%3A%22%231B5E20%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22icon-192.png%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D">
<title>Hill Rush</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#111;display:flex;justify-content:center;align-items:center;overflow:hidden;touch-action:none;user-select:none;font-family:'Arial Rounded MT Bold',Arial,sans-serif}
#app{position:relative;overflow:hidden;background:#111;border-radius:12px;box-shadow:0 0 40px rgba(0,0,0,.8)}
canvas{display:block;position:absolute;top:0;left:0}
.screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center}
.screen.active{display:flex}

/* ── MENU ── */
#menuBg{position:absolute;inset:0}
.menu-logo{position:relative;z-index:2;text-align:center;margin-bottom:32px}
.logo-title{font-size:52px;font-weight:900;color:#fff;text-shadow:0 4px 0 #1a5c00,0 0 40px rgba(100,255,50,.3);letter-spacing:2px;line-height:1}
.logo-sub{font-size:14px;letter-spacing:6px;color:rgba(255,255,255,.5);text-transform:uppercase;margin-top:6px}
.menu-car{position:relative;z-index:2;margin:0 auto 32px}
.btn{position:relative;z-index:2;cursor:pointer;border:none;outline:none;border-radius:16px;font-family:inherit;font-weight:900;letter-spacing:2px;text-transform:uppercase;transition:transform .1s,filter .1s;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(.94)!important}
.btn-play{background:linear-gradient(180deg,#66dd22,#33aa00);color:#fff;font-size:22px;padding:18px 60px;border-radius:18px;box-shadow:0 6px 0 #1a6600,0 0 30px rgba(80,220,20,.4);margin-bottom:14px;min-width:220px;text-align:center}
.btn-small{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);font-size:13px;padding:12px 28px;border-radius:12px;border:1px solid rgba(255,255,255,.15);margin-bottom:10px;min-width:180px;text-align:center}
.best-score{position:relative;z-index:2;font-size:12px;letter-spacing:3px;color:rgba(255,255,255,.35);margin-top:6px}

/* ── HUD ── */
#hud{position:absolute;inset:0;pointer-events:none;z-index:10}
.hud-top{position:absolute;top:0;left:0;right:0;padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start}
.hud-pill{background:rgba(0,0,0,.5);border-radius:10px;padding:6px 12px;backdrop-filter:blur(8px)}
.hud-dist{font-size:22px;font-weight:900;color:#fff;letter-spacing:1px;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.hud-dist-lbl{font-size:9px;letter-spacing:3px;color:rgba(255,255,255,.4);margin-bottom:1px}
.hud-coins-wrap{display:flex;align-items:center;gap:6px}
.hud-coin-icon{width:18px;height:18px;background:radial-gradient(circle at 35% 35%,#ffe066,#ffb300);border-radius:50%;border:2px solid #cc8800;box-shadow:0 0 8px rgba(255,200,0,.5);flex-shrink:0}
.hud-coins-val{font-size:18px;font-weight:900;color:#ffd700;text-shadow:0 0 12px rgba(255,200,0,.5)}
.fuel-wrap{position:absolute;bottom:120px;right:14px;width:12px}
.fuel-track{width:12px;height:80px;background:rgba(0,0,0,.4);border-radius:6px;border:1px solid rgba(255,255,255,.15);overflow:hidden;position:relative}
.fuel-fill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,#66ff44,#33cc00);border-radius:6px;transition:height .15s}
.fuel-icon{font-size:16px;text-align:center;margin-top:4px}
.fuel-lbl{font-size:7px;letter-spacing:2px;color:rgba(255,255,255,.3);text-align:center;margin-top:2px}
.speed-wrap{position:absolute;bottom:120px;left:14px}
.speed-val{font-size:28px;font-weight:900;color:rgba(255,255,255,.8);line-height:1}
.speed-lbl{font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.3)}
#pauseBtn{position:absolute;top:12px;left:50%;transform:translateX(-50%);pointer-events:all;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.15);border-radius:10px;color:rgba(255,255,255,.7);font-size:18px;padding:6px 14px;cursor:pointer;z-index:12;font-family:inherit}

/* Controls */
#controls{position:absolute;bottom:0;left:0;right:0;height:120px;display:flex;z-index:11;pointer-events:all}
.ctrl-btn{flex:1;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;transition:background .08s}
#btnBrake{background:rgba(220,40,40,.12);border-right:1px solid rgba(255,255,255,.05)}
#btnBrake.pressed{background:rgba(220,40,40,.28)}
#btnGas{background:rgba(40,200,40,.12)}
#btnGas.pressed{background:rgba(40,200,40,.28)}
.ctrl-icon{font-size:32px;opacity:.5}
#btnBrake .ctrl-icon{opacity:.45}
#btnGas .ctrl-icon{opacity:.55}
.ctrl-label{font-size:9px;letter-spacing:3px;color:rgba(255,255,255,.25);position:absolute;bottom:12px}
#btnBrake .ctrl-label{left:20px}
#btnGas .ctrl-label{right:20px}

/* ── PAUSE ── */
#pauseScreen{position:absolute;inset:0;background:rgba(0,0,0,.75);z-index:30;display:none;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
#pauseScreen.active{display:flex}
.pause-title{font-size:36px;font-weight:900;color:#fff;letter-spacing:4px;margin-bottom:32px}

/* ── GAME OVER ── */
#gameoverScreen{position:absolute;inset:0;z-index:28;display:none;flex-direction:column;align-items:center;justify-content:center}
#gameoverScreen.active{display:flex}
#gameoverBg{position:absolute;inset:0}
.go-panel{position:relative;z-index:2;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:28px 32px;display:flex;flex-direction:column;align-items:center;gap:14px;min-width:280px;backdrop-filter:blur(12px)}
.go-title{font-size:14px;letter-spacing:5px;color:rgba(255,255,255,.4);text-transform:uppercase}
.go-reason{font-size:22px;font-weight:900;color:#ff6644;letter-spacing:1px}
.go-stat-row{display:flex;justify-content:space-between;width:100%;gap:20px}
.go-stat{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.go-stat-lbl{font-size:9px;letter-spacing:3px;color:rgba(255,255,255,.35)}
.go-stat-val{font-size:24px;font-weight:900;color:#fff}
.go-stat-val.gold{color:#ffd700}
.go-hr{width:100%;height:1px;background:rgba(255,255,255,.1)}
.go-best{font-size:11px;letter-spacing:2px;color:rgba(255,180,0,.6)}

/* ── GARAGE ── */
#garageScreen{position:absolute;inset:0;z-index:25;display:none;flex-direction:column;align-items:center}
#garageScreen.active{display:flex}
#garageBg{position:absolute;inset:0}
.garage-content{position:relative;z-index:2;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;padding:20px 16px}
.garage-title{font-size:11px;letter-spacing:5px;color:rgba(255,255,255,.4);margin-bottom:6px}
.garage-coins{font-size:16px;font-weight:900;color:#ffd700;letter-spacing:1px;margin-bottom:16px}
.vehicle-cards{display:flex;gap:10px;width:100%;overflow-x:auto;padding-bottom:8px;margin-bottom:16px}
.vehicle-cards::-webkit-scrollbar{display:none}
.v-card{flex-shrink:0;width:120px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);border-radius:14px;padding:10px 8px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:6px}
.v-card.selected{border-color:#66dd22;background:rgba(100,220,30,.1);box-shadow:0 0 20px rgba(100,220,30,.2)}
.v-card.locked{opacity:.5}
.v-card-name{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.6);text-transform:uppercase}
.v-card-price{font-size:11px;color:#ffd700;font-weight:900}
.upgrades-section{width:100%;flex:1}
.upgrades-title{font-size:9px;letter-spacing:3px;color:rgba(255,255,255,.3);margin-bottom:10px}
.upgrades-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.upg-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;transition:all .12s}
.upg-card:active{transform:scale(.95)}
.upg-card.maxed{border-color:rgba(255,200,0,.3)}
.upg-icon{font-size:22px}
.upg-name{font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.5);text-transform:uppercase;text-align:center}
.upg-bars{display:flex;gap:3px;margin:2px 0}
.upg-bar{width:16px;height:4px;border-radius:2px;background:rgba(255,255,255,.1)}
.upg-bar.filled{background:#66dd22;box-shadow:0 0 4px rgba(100,220,30,.6)}
.upg-cost{font-size:12px;font-weight:900;color:#ffd700}
.upg-cost.maxed-lbl{color:rgba(255,200,0,.4);font-size:9px}

/* ── ENVIRONMENT SELECT ── */
#envScreen{position:absolute;inset:0;z-index:22;display:none;flex-direction:column;align-items:center;justify-content:flex-start;padding:24px 16px}
#envScreen.active{display:flex}
#envBg{position:absolute;inset:0}
.env-title{position:relative;z-index:2;font-size:11px;letter-spacing:5px;color:rgba(255,255,255,.4);margin-bottom:20px}
.env-cards{position:relative;z-index:2;display:flex;flex-direction:column;gap:10px;width:100%}
.env-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all .15s}
.env-card:active{transform:scale(.97)}
.env-card.locked{opacity:.45}
.env-emoji{font-size:28px}
.env-info{flex:1}
.env-name{font-size:14px;font-weight:900;color:#fff}
.env-desc{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px}
.env-lock{font-size:12px;color:rgba(255,200,0,.6)}

/* Portrait rotation overlay */
#rotateOverlay{display:none;position:fixed;inset:0;z-index:9999;background:#1B5E20;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#rotateOverlay.show{display:flex}
.rotate-icon{font-size:64px;animation:rotateHint 1.5s ease-in-out infinite}
@keyframes rotateHint{0%,100%{transform:rotate(0deg)}50%{transform:rotate(90deg)}}
.rotate-text{font-size:16px;letter-spacing:4px;color:rgba(255,255,255,.8);text-transform:uppercase}
/* Notification toast */
#toast{position:absolute;top:80px;left:50%;transform:translateX(-50%);z-index:50;background:rgba(0,0,0,.8);color:#fff;padding:10px 20px;border-radius:10px;font-size:12px;letter-spacing:2px;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap}

/* Coins collect popup */
.coin-popup{position:absolute;pointer-events:none;z-index:15;font-size:13px;font-weight:900;color:#ffd700;text-shadow:0 0 8px rgba(255,200,0,.6);animation:coinFloat 1s ease-out forwards}
@keyframes coinFloat{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-50px)}}

/* Distance milestone */
#milestone{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;pointer-events:none;opacity:0;transition:opacity .3s;text-align:center}
.milestone-m{font-size:36px;font-weight:900;color:#fff;text-shadow:0 0 30px rgba(255,200,50,.7)}
.milestone-sub{font-size:10px;letter-spacing:4px;color:rgba(255,255,255,.5)}
</style>
</head>
<body>
<div id="app">
<canvas id="bgCanvas"></canvas>
<canvas id="gameCanvas"></canvas>

<!-- HUD (visible during gameplay) -->
<div id="hud">
  <div class="hud-top">
    <div class="hud-pill">
      <div class="hud-dist-lbl">DISTANCE</div>
      <div class="hud-dist" id="hudDist">0 m</div>
    </div>
    <div class="hud-pill">
      <div class="hud-coins-wrap">
        <div class="hud-coin-icon"></div>
        <div class="hud-coins-val" id="hudCoins">0</div>
      </div>

  </div>
  <div class="fuel-wrap">

</div>

<!-- Main Menu -->
<div id="menuScreen" class="screen active">

  <div class="menu-logo" style="position:relative;z-index:2;margin-bottom:16px">
    <div class="logo-title">HILL RUSH</div>
    <div class="logo-sub">Conquer the hills</div>
  </div>
  <canvas id="menuCar" width="260" height="100" style="position:relative;z-index:2;margin-bottom:20px"></canvas>
  <button class="btn btn-play" id="btnPlay">▶ PLAY</button>
  <button class="btn btn-small" id="btnGarage">🔧 GARAGE</button>
  <button class="btn btn-small" id="btnEnvSelect">🗺 SELECT MAP</button>
  <div class="best-score" id="bestScoreMenu">BEST: 0 m</div>
</div>

<!-- Environment Select -->
<div id="envScreen" class="screen">
  <canvas id="envBg" style="position:absolute;inset:0"></canvas>
  <div class="env-title" style="position:relative;z-index:2;margin-top:30px">SELECT MAP</div>
  <div class="env-cards" id="envCards"></div>
  <button class="btn btn-small" id="btnEnvBack" style="position:relative;z-index:2;margin-top:14px">← BACK</button>
</div>

<!-- Garage -->
<div id="garageScreen" class="screen">
  <canvas id="garageBg" style="position:absolute;inset:0"></canvas>
  <div class="garage-content">
    <div class="garage-title">GARAGE</div>
    <div class="garage-coins" id="garageCoins">🪙 0</div>
    <div class="vehicle-cards" id="vehicleCards"></div>
    <canvas id="garagePreview" width="300" height="90" style="position:relative;z-index:2;margin:-10px 0 10px"></canvas>
    <div class="upgrades-section">
      <div class="upgrades-title">UPGRADES</div>
      <div class="upgrades-grid" id="upgradesGrid"></div>
    </div>
    <button class="btn btn-small" id="btnGarageBack" style="margin-top:12px">← BACK</button>
  </div>
</div>

<!-- Pause -->
<div id="pauseScreen">
  <div class="pause-title">PAUSED</div>
  <button class="btn btn-play" id="btnResume" style="font-size:18px;padding:14px 50px;margin-bottom:12px">▶ RESUME</button>
  <button class="btn btn-small" id="btnPauseMenu">🏠 MENU</button>
</div>

<!-- Game Over -->
<div id="gameoverScreen" class="screen">
  <canvas id="gameoverBg" style="position:absolute;inset:0"></canvas>
  <div class="go-panel">
    <div class="go-title">GAME OVER</div>
    <div class="go-reason" id="goReason">CRASHED!</div>
    <div class="go-hr"></div>
    <div class="go-stat-row">
      <div class="go-stat">
        <div class="go-stat-lbl">DISTANCE</div>
        <div class="go-stat-val" id="goDist">0 m</div>
      </div>
      <div class="go-stat">
        <div class="go-stat-lbl">COINS</div>
        <div class="go-stat-val gold" id="goCoins">0</div>
      </div>

    <div class="go-best" id="goBest"></div>
    <div class="go-hr"></div>

    <button class="btn btn-small" id="btnGoMenu">🏠 MENU</button>
  </div>
</div>

<!-- Portrait rotation overlay -->
<div id="rotateOverlay">
  <div class="rotate-icon">📱</div>
  <div class="rotate-text">Rotate device</div>
  <div style="font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.4)">LANDSCAPE MODE REQUIRED</div>
</div>
<!-- Toast notification -->
<div id="toast"></div>
<!-- Milestone display -->
<div id="milestone"><div class="milestone-m" id="milestoneM"></div><div class="milestone-sub" id="milestoneSub"></div></div>
</div>

<script>
'use strict';

// ── roundRect polyfill (iOS Safari < 15.4) ──────────────
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
    r = typeof r==='number' ? r : (Array.isArray(r)?r[0]:0);
    r = Math.min(Math.abs(r), Math.abs(w)/2, Math.abs(h)/2);
    this.beginPath();
    this.moveTo(x+r, y);
    this.lineTo(x+w-r, y);
    this.arcTo(x+w,y, x+w,y+r, r);
    this.lineTo(x+w, y+h-r);
    this.arcTo(x+w,y+h, x+w-r,y+h, r);
    this.lineTo(x+r, y+h);
    this.arcTo(x,y+h, x,y+h-r, r);
    this.lineTo(x, y+r);
    this.arcTo(x,y, x+r,y, r);
    this.closePath();
    return this;
  };
}

// ═══════════════════════════════════════════════════════
// CONSTANTS & CONFIG
// ═══════════════════════════════════════════════════════
const W = 854, H = 480;         // landscape orientation
const GRAVITY = 0.45;
const AIR_RESIST = 0.992;
const GROUND_FRICTION = 0.82;
const SPRING_K = 0.22;
const SPRING_D = 0.55;
const WHEEL_R = 22;
const CHASSIS_W = 88;
const CHASSIS_H = 32;
const FRONT_AX = {x:38, y:22};
const REAR_AX = {x:-38, y:22};
const FUEL_DRAIN_RATE = 0.018;
const TERRAIN_CHUNK = 60;
const COIN_R = 8;
const GAS_CANISTER_R = 14;

// ═══════════════════════════════════════════════════════
// SEEDED RNG
// ═══════════════════════════════════════════════════════
function mulberry32(seed){
  return function(){
    seed += 0x6D2B79F5;
    let t = seed;
    t = Math.imul(t ^ t>>>15, t | 1);
    t ^= t + Math.imul(t ^ t>>>7, t | 61);
    return ((t ^ t>>>14)>>>0)/4294967296;
  };
}

// ═══════════════════════════════════════════════════════
// ENVIRONMENTS
// ═══════════════════════════════════════════════════════
const ENVS = [
  {
    id:'grassland', name:'GRASSLAND', emoji:'🌄', locked:false,
    desc:'Gentle hills to start your journey',
    gravity:0.45, friction:0.82, iciness:0,
    skyColors:['#87CEEB','#B8E4F9'],
    groundColor:'#4CAF50', dirtColor:'#8B6914', grassColor:'#66BB6A',
    sunColor:'rgba(255,240,180,0.12)',
    hillAmp:90, hillFreq:0.008, roughness:0.5,
    bgLayers:[
      {color:'rgba(255,255,255,0.15)', scale:0.1},

      {color:'rgba(100,180,80,0.3)', scale:0.4}
    ],
    treeColor:'#2E7D32', treeColor2:'#1B5E20',
    unlockDist:0
  },
  {
    id:'mountain', name:'MOUNTAINS', emoji:'⛰', locked:true,
    desc:'Rocky peaks and steep slopes',
    gravity:0.45, friction:0.78, iciness:0,
    skyColors:['#546E7A','#78909C'],
    groundColor:'#607D8B', dirtColor:'#455A64', grassColor:'#78909C',
    sunColor:'rgba(200,220,255,0.1)',
    hillAmp:160, hillFreq:0.006, roughness:1.2,
    bgLayers:[
      {color:'rgba(180,180,200,0.1)', scale:0.1},
      {color:'rgba(120,140,160,0.2)', scale:0.25},
      {color:'rgba(80,100,120,0.3)', scale:0.45}
    ],
    treeColor:'#37474F', treeColor2:'#263238',
    unlockDist:300
  },
  {
    id:'arctic', name:'ARCTIC', emoji:'❄', locked:true,
    desc:'Icy slopes – slippery danger!',
    gravity:0.45, friction:0.6, iciness:0.15,

let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
let engineNode = null, engineGain = null;

function playBeep(freq, dur, vol=0.3, type='sine') {
  try {
    const ctx = getAudioCtx();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = freq;
    o.type = type;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.start(); o.stop(ctx.currentTime + dur);
  } catch(e){}
}

function startEngineSound() {
  try {
    const ctx = getAudioCtx();
    if (engineNode) { engineNode.stop(); engineNode = null; }
    engineNode = ctx.createOscillator();
    engineGain = ctx.createGain();
    const distortion = ctx.createWaveShaper();
    const curve = new Float32Array(256);
    for (let i=0;i<256;i++) { const x=i*2/256-1; curve[i]=x<0?-Math.pow(-x,0.7):Math.pow(x,0.7); }
    distortion.curve = curve;
    engineNode.type = 'sawtooth';
    engineNode.frequency.value = 80;
    engineGain.gain.value = 0.04;
    engineNode.connect(distortion);
    distortion.connect(engineGain);
    engineGain.connect(ctx.destination);
    engineNode.start();
  } catch(e){}
}

function setEngineRPM(rpm) {
  if (!engineNode) return;
  try {
    const ctx = getAudioCtx();
    engineNode.frequency.setTargetAtTime(60 + rpm * 200, ctx.currentTime, 0.1);
    engineGain.gain.setTargetAtTime(0.04 + rpm * 0.04, ctx.currentTime, 0.1);
  } catch(e){}
}

function stopEngineSound() {
  try {
    if (engineNode) { engineNode.stop(); engineNode = null; }
  } catch(e){}
}

// TERRAIN GENERATOR
// ═══════════════════════════════════════════════════════
class Terrain {
  constructor(env, seed) {
    this.env = env;
    this.rng = mulberry32(seed || Math.floor(Math.random()*99999));
    this.pts = [];      // {x, y} control points
    this.objects = [];  // coins, fuel cans
    this.nextGenX = 0;
    this._decorations = [];
    this._generate(W * 2);
  }

  _generate(toX) {
    const env = this.env;
    let x = this.nextGenX;
    let y = x === 0 ? H * 0.55 : this.pts[this.pts.length-1].y;
    const rng = this.rng;

    if (x === 0) {
      // Flat start
      for (let i=0; i<=5; i++) this.pts.push({x: i*TERRAIN_CHUNK, y});
      x = 5 * TERRAIN_CHUNK;
    }

    while (x < toX) {
      const segLen = TERRAIN_CHUNK * (0.7 + rng() * 0.9);
      const amplitude = env.hillAmp * (0.3 + rng() * 0.9);
      const direction = (rng() > 0.5 ? 1 : -1);
      const nextY = Math.max(H*0.2, Math.min(H*0.82, y + direction * amplitude * env.roughness));

      // Catmull-Rom style: add intermediate points for smooth curves
      const steps = 4;
      for (let i=1; i<=steps; i++) {
        const t = i/steps;
        const iy = y + (nextY-y) * (t*t*(3-2*t)); // smoothstep
        // Add micro roughness
        const rough = (rng()-0.5) * 8 * env.roughness;
        this.pts.push({x: x + segLen*t, y: iy + rough});
      }

      // Place objects
      const midX = x + segLen * 0.5;
      const midY = y + (nextY-y)*0.5;
      if (midX > 200) {
        if (rng() < 0.35) {
          // Coin cluster
          const count = 1 + Math.floor(rng()*3);
          for (let c=0; c<count; c++) {
            this.objects.push({
              type:'coin', x: midX + (c-1)*22, y: midY - 30 - rng()*30,
              collected:false, r:COIN_R
            });
          }
        }
        if (rng() < 0.08) {
          this.objects.push({
            type:'fuel', x: midX, y: midY - 40,
            collected:false, r:GAS_CANISTER_R
          });
        }
        // Decorations (trees, rocks etc)
        if (rng() < 0.4) {
          this._decorations.push({
            type: rng() < 0.6 ? 'tree' : 'rock',
            x: midX + (rng()-0.5)*30,
            y: midY,
            size: 12 + rng()*18
          });
        }
      }

      x += segLen;
      y = nextY;
    }

    this.nextGenX = x;
  }

  getY(worldX) {
    const pts = this.pts;
    if (worldX <= pts[0].x) return pts[0].y;
    if (worldX >= pts[pts.length-1].x) {
      this._generate(worldX + W*2);
    }
    // Binary search after possible re-generation
    let lo=0, hi=pts.length-1;
    while (hi-lo>1) {
      const mid=(lo+hi)>>1;
      if (pts[mid].x<=worldX) lo=mid; else hi=mid;
    }
    const dx = pts[hi].x - pts[lo].x;
    if (dx < 0.001) return pts[lo].y;
    const t = (worldX-pts[lo].x) / dx;
    return pts[lo].y*(1-t) + pts[hi].y*t;
  }

  ensureGenerated(toX) {
    if (toX > this.nextGenX - W) this._generate(toX + W*2);
  }
}

// ═══════════════════════════════════════════════════════
// PARTICLE SYSTEM
// ═══════════════════════════════════════════════════════
class ParticleSystem {
  constructor() { this.particles = []; }

  emit(x,y,count,opts) {
    for (let i=0; i<count; i++) {
      const angle = (opts.angle||0) + (Math.random()-0.5)*(opts.spread||Math.PI*2);
      const spd = (opts.speed||2) * (0.5+Math.random()*0.5);
      this.particles.push({
        x, y,
        vx: Math.cos(angle)*spd,
        vy: Math.sin(angle)*spd - (opts.upward||0),
        life: 1, decay: opts.decay||0.03,
        r: opts.r||3,
        color: opts.color||'#fff',
        gravity: opts.gravity||0.08
      });
    }
  }

  update() {
    for (let i=this.particles.length-1; i>=0; i--) {
      const p = this.particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vy += p.gravity;
      p.vx *= 0.96; p.vy *= 0.97;
      p.life -= p.decay;
      if (p.life<=0) this.particles.splice(i,1);
    }
  }

  draw(ctx, camX, camY) {
    for (const p of this.particles) {
      ctx.globalAlpha = Math.max(0,p.life);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x-camX, p.y-camY, p.r*(0.5+p.life*0.5), 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

class Vehicle {
  constructor(vDef, upgrades, envDef, startX, startY) {
    this.def = vDef;
    this.upgrades = upgrades;
    this.env = envDef;
    this.wr = getWheelR(vDef.id);
    this.fa = getFrontAxleOffset(vDef.id);
    this.ra = getRearAxleOffset(vDef.id);

    // Upgrade multipliers
    const eUp = 1 + upgrades.engine * 0.18;
    const sUp = 1 + upgrades.susp * 0.15;
    const tUp = 1 + upgrades.tires * 0.12;
    const fwdUp = upgrades.fwd > 0 ? true : false;

    this.enginePower = vDef.baseEngine * eUp * 0.5;
    this.springK = SPRING_K * sUp;
    this.friction = envDef.friction + tUp * 0.03;
    this.has4wd = fwdUp || upgrades.fwd > 0;
    this.fuelMax = vDef.baseFuel * (1 + upgrades.fuel * 0.2);
    this.fuel = this.fuelMax;
    this.turboLevel = upgrades.turbo;
    this.mass = vDef.baseMass;
    this.turboCharge = 0;
    this.turboActive = false;

    // Body
    this.bx = startX; this.by = startY;
    this.bvx = 0; this.bvy = 0;
    this.angle = 0;

    // Wheels (world positions)
    this.fx = startX + this.fa.x; this.fy = startY + this.fa.y + this.wr;
    this.fvx = 0; this.fvy = 0; this.fangle = 0; this.fav = 0;
    this.fOnGround = false;

    this.rx = startX + this.ra.x; this.ry = startY + this.ra.y + this.wr;
    this.rvx = 0; this.rvy = 0; this.rangle = 0; this.rav = 0;
    this.rOnGround = false;

    this.crashed = false;
    this.crashTimer = 0;
    this.outOfFuel = false;
    this.distance = 0;
    this.startX = startX;
    this.flipTimer = 0;
  }

  update(terrain, gas, brake) {
    if (this.crashed === true || this.crashed === 'handled') return;
    const g = this.env.gravity;
    const gIce = this.env.iciness;

    // Fuel drain when gas
    if (gas && this.fuel > 0) {
      this.fuel = Math.max(0, this.fuel - FUEL_DRAIN_RATE);
    }
    if (this.fuel <= 0) this.outOfFuel = true;

    // Turbo charge
    if (this.turboLevel > 0) {
      if (gas && this.fuel > 0) {
        this.turboCharge = Math.min(1, this.turboCharge + 0.003 * this.turboLevel);
      } else {
        this.turboCharge *= 0.98;
      }
      this.turboActive = this.turboCharge > 0.7;
    }

    // Gravity
    this.bvy += g / this.mass;
    this.fvy += g; this.rvy += g;

    // Compute world attachment points
    const c = Math.cos(this.angle), s = Math.sin(this.angle);
    const fax = this.bx + this.fa.x*c - this.fa.y*s;
    const fay = this.by + this.fa.x*s + this.fa.y*c;
    const rax = this.bx + this.ra.x*c - this.ra.y*s;
    const ray = this.by + this.ra.x*s + this.ra.y*c;

    // Spring forces wheels <-> body
    this._applySpring(fax,fay,'f');
    this._applySpring(rax,ray,'r');

    // Engine torque
    const canDrive = this.fuel > 0 && !this.outOfFuel;
    if (canDrive && gas && this.rOnGround) {
      const turboBoost = this.turboActive ? 1 + this.turboLevel*0.2 : 1;
      const thrust = this.enginePower * turboBoost;
      this.rvx += thrust;
      this.rav += thrust / this.wr;
    }
    if (canDrive && gas && this.has4wd && this.fOnGround) {
      const thrust = this.enginePower * 0.5;
      this.fvx += thrust;
      this.fav += thrust / this.wr;
    }

    // Brake
    if (brake) {
      if (this.rOnGround) { this.rvx *= 0.72; this.rav *= 0.72; }
      if (this.fOnGround) { this.fvx *= 0.8; this.fav *= 0.8; }
    }

    // Air resistance
    this.bvx *= AIR_RESIST; this.bvy *= 0.999;
    this.fvx *= AIR_RESIST; this.rvx *= AIR_RESIST;

    // Ground collision
    this._collide(terrain, 'f', gIce);
    this._collide(terrain, 'r', gIce);

    // Integrate positions
    this.bx += this.bvx; this.by += this.bvy;
    this.fx += this.fvx; this.fy += this.fvy;
    this.rx += this.rvx; this.ry += this.rvy;

    // Wheel spin
    this.fangle += this.fvx / this.wr;
    this.rangle += this.rvx / this.wr;

    // Body angle from wheel positions
    const dx = this.fx - this.rx;
    const dy = this.fy - this.ry;
    const targetAngle = Math.atan2(dy, dx);
    this.angle += (targetAngle - this.angle) * 0.18;

    // Prevent body from going below terrain
    const bodyGroundY = terrain.getY(this.bx);
    if (this.by > bodyGroundY - 5) {
      this.by = bodyGroundY - 5;
      this.bvy *= -0.3;
    }

    // Distance
    this.distance = Math.max(0, this.bx - this.startX);

    // Flip detection
    const absAngle = Math.abs(this.angle);
    if (absAngle > Math.PI * 0.75) {
      this.flipTimer++;
      if (this.flipTimer > 40) { this.crashed = true; this.crashReason = 'FLIPPED!'; }
    } else {
      this.flipTimer = Math.max(0, this.flipTimer - 2);
    }
  }

  _applySpring(ax, ay, side) {
    const wx = side==='f' ? this.fx : this.rx;
    const wy = side==='f' ? this.fy : this.ry;
    const wvx = side==='f' ? this.fvx : this.rvx;
    const wvy = side==='f' ? this.fvy : this.rvy;

    const dx = ax - wx, dy = ay - wy;
    const fx = dx * this.springK;
    const fy = dy * this.springK;
    const dvx = (this.bvx - wvx) * SPRING_D * 0.1;
    const dvy = (this.bvy - wvy) * SPRING_D * 0.1;
    const tfx = fx + dvx, tfy = fy + dvy;

    if (side==='f') {
      this.fvx += tfx; this.fvy += tfy;
    } else {
      this.rvx += tfx; this.rvy += tfy;
    }
    this.bvx -= tfx / this.mass;
    this.bvy -= tfy / this.mass;
  }

  _collide(terrain, side, iciness) {
    const wr = this.wr;
    let wx = side==='f' ? this.fx : this.rx;
    let wy = side==='f' ? this.fy : this.ry;
    let wvx = side==='f' ? this.fvx : this.rvx;
    let wvy = side==='f' ? this.fvy : this.rvy;

    const ty = terrain.getY(wx);
    if (wy + wr > ty) {
      wy = ty - wr;
      wvy = Math.min(0, wvy) * -0.25;
      // Friction
      const fr = this.friction - iciness;
      wvx *= GROUND_FRICTION + (fr - GROUND_FRICTION) * 0.5;
      if (side==='f') { this.fOnGround = true; this.fy = wy; this.fvy = wvy; this.fvx = wvx; }
      else { this.rOnGround = true; this.ry = wy; this.rvy = wvy; this.rvx = wvx; }
    } else {
      if (side==='f') this.fOnGround = false;
      else this.rOnGround = false;
    }
  }
}

class Renderer {
  constructor(canvas, bgCanvas) {
    this.canvas = canvas;
    this.bgCanvas = bgCanvas;
    this.ctx = canvas.getContext('2d');
    this.bgCtx = bgCanvas.getContext('2d');
    canvas.width = W; canvas.height = H;
    bgCanvas.width = W; bgCanvas.height = H;
  }

  drawBackground(env, camX, camY) {
    const ctx = this.bgCtx;
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0, env.skyColors[0]);
    g.addColorStop(1, env.skyColors[1]);
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    // Sun/moon
    if (env.id === 'moon') {
      // Stars
      ctx.fillStyle='rgba(255,255,255,0.8)';
      const starRng = mulberry32(42);
      for (let i=0;i<120;i++) {
        const sx = starRng()*W, sy = starRng()*H*0.7;
        const sr = 0.5+starRng()*1.5;
        ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.fill();
      }
      // Earth
      const eg = ctx.createRadialGradient(W*0.8,H*0.12,0,W*0.8,H*0.12,36);
      eg.addColorStop(0,'#4488cc'); eg.addColorStop(0.6,'#2255aa'); eg.addColorStop(1,'#112244');
      ctx.fillStyle=eg; ctx.beginPath(); ctx.arc(W*0.8,H*0.12,36,0,Math.PI*2); ctx.fill();
    } else {
      // Sun
      const sg = ctx.createRadialGradient(W*0.8,H*0.15,0,W*0.8,H*0.15,70);
      sg.addColorStop(0,'rgba(255,255,220,0.9)'); sg.addColorStop(0.4,'rgba(255,220,100,0.5)');
      sg.addColorStop(1,'rgba(255,200,50,0)');
      ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(W*0.8,H*0.15,70,0,Math.PI*2); ctx.fill();
    }

    // Parallax bg layers
    for (let li=0; li<env.bgLayers.length; li++) {
      const layer = env.bgLayers[li];
      const lx = -(camX * layer.scale) % W;
      ctx.fillStyle = layer.color;
      // Draw horizon hills
      ctx.beginPath();
      ctx.moveTo(lx, H);
      const hillH = H * (0.3 + li * 0.1);
      for (let px=0; px<=W+80; px+=40) {
        const hx = lx + px;
        const hy = H - hillH - Math.sin((hx * 0.01 + li)*2)*hillH*0.3;
        ctx.lineTo(hx, hy);
      }
      ctx.lineTo(lx+W+80, H);
      ctx.closePath();
      ctx.fill();
    }
  }

  drawTerrain(terrain, env, camX, camY) {
    const ctx = this.ctx;
    const pts = terrain.pts;

    // Find visible range
    let startI = 0;
    for (let i=0;i<pts.length-1;i++) {
      if (pts[i].x - camX > -TERRAIN_CHUNK*2) { startI = Math.max(0,i-2); break; }
    }

    // Ground polygon
    ctx.beginPath();
    ctx.moveTo(pts[startI].x - camX, H+50);
    for (let i=startI; i<pts.length && pts[i].x-camX < W+TERRAIN_CHUNK; i++) {
      ctx.lineTo(pts[i].x - camX, pts[i].y - camY);
    }
    ctx.lineTo(W+100, H+50);
    ctx.closePath();

    // Ground gradient
    const gg = ctx.createLinearGradient(0,H*0.3,0,H);
    gg.addColorStop(0, env.groundColor);
    gg.addColorStop(0.12, env.dirtColor);
    gg.addColorStop(1, env.id==='moon' ? '#1a1a1a' : '#3d2200');
    ctx.fillStyle = gg;
    ctx.fill();

    // Surface line (grass/snow/etc.)
    if (env.id !== 'moon') {
      ctx.strokeStyle = env.grassColor;
      ctx.lineWidth = 4;
      ctx.beginPath();
      for (let i=startI; i<pts.length && pts[i].x-camX < W+TERRAIN_CHUNK; i++) {
        const px = pts[i].x-camX, py = pts[i].y-camY;
        i===startI ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
      }
      ctx.stroke();
    }

    // Draw decorations
    for (const d of terrain._decorations) {
      const dx = d.x - camX, dy = d.y - camY;
      if (dx < -60 || dx > W+60) continue;
      if (d.type==='tree') this._drawTree(ctx, dx, dy, d.size, env);
      else this._drawRock(ctx, dx, dy, d.size, env);
    }
  }

  _drawTree(ctx, x, y, size, env) {
    if (env.id==='moon' || env.id==='desert') {
      // Cactus / rock spire
      ctx.fillStyle = env.treeColor;
      ctx.fillRect(x-3, y-size, 6, size);
      ctx.fillRect(x-size*0.4, y-size*0.6, size*0.4, 4);
      ctx.fillRect(x+3, y-size*0.5, size*0.4, 4);
    } else if (env.id==='arctic') {
      // Snowy pine
      ctx.fillStyle = env.treeColor;
      ctx.beginPath(); ctx.moveTo(x, y-size); ctx.lineTo(x-size*0.45, y); ctx.lineTo(x+size*0.45, y); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.6)';
      ctx.beginPath(); ctx.moveTo(x, y-size*1.05); ctx.lineTo(x-size*0.3, y-size*0.4); ctx.lineTo(x+size*0.3, y-size*0.4); ctx.fill();
    } else {
      // Regular tree
      ctx.fillStyle = env.treeColor2;
      ctx.fillRect(x-3, y-size*0.4, 6, size*0.4);
      ctx.fillStyle = env.treeColor;
      ctx.beginPath();
      ctx.arc(x, y-size*0.6, size*0.5, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = env.treeColor2;
      ctx.beginPath();
      ctx.arc(x-size*0.15, y-size*0.7, size*0.32, 0, Math.PI*2);
      ctx.fill();
    }
  }

  _drawRock(ctx, x, y, size, env) {
    ctx.fillStyle = env.id==='arctic' ? '#B0BEC5' : '#78909C';
    ctx.beginPath();
    ctx.moveTo(x-size*0.5, y);
    ctx.lineTo(x-size*0.6, y-size*0.4);
    ctx.lineTo(x-size*0.1, y-size*0.7);
    ctx.lineTo(x+size*0.3, y-size*0.5);
    ctx.lineTo(x+size*0.6, y-size*0.1);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.1)';
    ctx.beginPath();
    ctx.moveTo(x-size*0.1,y-size*0.7);
    ctx.lineTo(x+size*0.3,y-size*0.5);
    ctx.lineTo(x-size*0.1,y-size*0.5);
    ctx.closePath(); ctx.fill();
  }

  drawObjects(terrain, camX, camY) {
    const ctx = this.ctx;
    for (const obj of terrain.objects) {
      if (obj.collected) continue;
      const ox = obj.x - camX, oy = obj.y - camY;
      if (ox < -40 || ox > W+40) continue;
      if (obj.type === 'coin') {
        // Coin
        const pulse = 0.9 + Math.sin(Date.now()*0.006)*0.1;
        const cg = ctx.createRadialGradient(ox-2,oy-2,0,ox,oy,COIN_R*pulse);
        cg.addColorStop(0,'#ffe082'); cg.addColorStop(0.6,'#ffb300'); cg.addColorStop(1,'#ff8f00');
        ctx.fillStyle = cg;
        ctx.beginPath(); ctx.arc(ox, oy, COIN_R*pulse, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle='#cc8800'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(ox, oy, COIN_R*pulse, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle='rgba(255,255,200,0.6)';
        ctx.font=`bold ${Math.floor(COIN_R*1.0)}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('$', ox, oy);
      } else if (obj.type === 'fuel') {
        // Fuel canister
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(ox-8, oy-18, 16, 18);
        ctx.fillStyle='#cc0000'; ctx.fillRect(ox-4, oy-22, 8, 5);
        ctx.fillStyle='#ffaaaa'; ctx.fillRect(ox-5, oy-15, 4, 4);
        ctx.strokeStyle='#880000'; ctx.lineWidth=1.5;
        ctx.strokeRect(ox-8, oy-18, 16, 18);
        // Glow
        const fg = ctx.createRadialGradient(ox,oy,0,ox,oy,GAS_CANISTER_R*1.4);
        fg.addColorStop(0,'rgba(255,100,0,0.2)'); fg.addColorStop(1,'transparent');
        ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(ox,oy,GAS_CANISTER_R*1.4,0,Math.PI*2); ctx.fill();
      }
    }
  }

  drawVehicle(v, camX, camY) {
    const ctx = this.ctx;
    const vdef = v.def;
    const scale = getVehicleScale(vdef.id);
    const wr = v.wr;

    // Draw rear wheel
    this._drawWheel(ctx, v.rx-camX, v.ry-camY, wr, v.rangle, vdef);
    // Draw front wheel
    this._drawWheel(ctx, v.fx-camX, v.fy-camY, wr, v.fangle, vdef);

    // Suspension lines
    const c = Math.cos(v.angle), s = Math.sin(v.angle);
    const fax = v.bx + v.fa.x*c - v.fa.y*s - camX;
    const fay = v.by + v.fa.x*s + v.fa.y*c - camY;
    const rax = v.bx + v.ra.x*c - v.ra.y*s - camX;
    const ray = v.by + v.ra.x*s + v.ra.y*c - camY;

    ctx.strokeStyle='rgba(80,80,80,0.7)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(fax,fay); ctx.lineTo(v.fx-camX,v.fy-camY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(rax,ray); ctx.lineTo(v.rx-camX,v.ry-camY); ctx.stroke();

    // Draw body
    ctx.save();
    ctx.translate(v.bx-camX, v.by-camY);
    ctx.rotate(v.angle);
    ctx.scale(scale, scale);

    if (vdef.id === 'bike') {
      this._drawBike(ctx, vdef);
    } else if (vdef.id === 'monster') {
      this._drawMonster(ctx, vdef);
    } else if (vdef.id === 'pickup') {
      this._drawPickup(ctx, vdef);
    } else {
      this._drawJeep(ctx, vdef);
    }

    ctx.restore();

    // Exhaust particles emitter position
    const exX = v.bx + (v.ra.x-10)*c - 0 - camX;
    const exY = v.by + (v.ra.x-10)*s + 0 - camY;

    // Turbo glow
    if (v.turboActive) {
      const tg = ctx.createRadialGradient(v.bx-camX,v.by-camY,0,v.bx-camX,v.by-camY,60*scale);
      tg.addColorStop(0,'rgba(0,200,255,0.25)'); tg.addColorStop(1,'transparent');
      ctx.fillStyle=tg; ctx.beginPath(); ctx.arc(v.bx-camX,v.by-camY,60*scale,0,Math.PI*2); ctx.fill();
    }
  }

  _drawWheel(ctx, x, y, r, angle, vdef) {
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.ellipse(x+3,y+3,r,r*0.5,0,0,Math.PI*2); ctx.fill();

    // Tire
    ctx.fillStyle = vdef.wheelColor;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();

    // Tread
    ctx.strokeStyle='rgba(60,60,60,0.8)'; ctx.lineWidth=r*0.15;
    ctx.beginPath(); ctx.arc(x,y,r*0.92,0,Math.PI*2); ctx.stroke();
    for (let i=0;i<8;i++) {
      const a = angle + i*Math.PI/4;
      ctx.strokeStyle='rgba(40,40,40,0.6)'; ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(x+Math.cos(a)*r*0.78, y+Math.sin(a)*r*0.78);
      ctx.lineTo(x+Math.cos(a)*r*0.96, y+Math.sin(a)*r*0.96);
      ctx.stroke();
    }

    // Rim
    ctx.fillStyle = vdef.rimColor;
    ctx.beginPath(); ctx.arc(x,y,r*0.55,0,Math.PI*2); ctx.fill();

    // Spokes
    ctx.strokeStyle = vdef.rimColor; ctx.lineWidth = r*0.1;
    for (let i=0;i<5;i++) {
      const a = angle + i*Math.PI*0.4;
      ctx.beginPath();
      ctx.moveTo(x+Math.cos(a)*r*0.12, y+Math.sin(a)*r*0.12);
      ctx.lineTo(x+Math.cos(a)*r*0.5, y+Math.sin(a)*r*0.5);
      ctx.stroke();
    }
    // Hub
    ctx.fillStyle = '#aaa';
    ctx.beginPath(); ctx.arc(x,y,r*0.12,0,Math.PI*2); ctx.fill();
  }

  _drawJeep(ctx, vdef) {
    const w=50, h=20;
    // Body shadow
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.roundRect(-w+4,4,w*2,h,6); ctx.fill();

    // Main body
    const bg = ctx.createLinearGradient(0,-h,0,h);
    bg.addColorStop(0,vdef.bodyColor); bg.addColorStop(1,vdef.bodyColor2);
    ctx.fillStyle=bg;
    ctx.beginPath(); ctx.roundRect(-w,-h,w*2,h*1.5,5); ctx.fill();

    // Roof
    const rg = ctx.createLinearGradient(0,-h*1.8,0,-h);
    rg.addColorStop(0,'rgba(255,255,255,0.15)'); rg.addColorStop(1,'rgba(0,0,0,0.1)');
    ctx.fillStyle=rg;
    ctx.beginPath();
    ctx.moveTo(-w*0.35, -h);
    ctx.lineTo(w*0.45, -h);
    ctx.lineTo(w*0.3, -h*1.9);
    ctx.lineTo(-w*0.2, -h*1.9);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle=vdef.bodyColor2; ctx.lineWidth=1;
    ctx.stroke();

    // Windows
    ctx.fillStyle='rgba(180,220,255,0.7)';
    ctx.beginPath();
    ctx.moveTo(-w*0.15, -h);
    ctx.lineTo(w*0.38, -h);
    ctx.lineTo(w*0.25, -h*1.75);
    ctx.lineTo(-w*0.05, -h*1.75);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1; ctx.stroke();

    // Window divider
    ctx.strokeStyle=vdef.bodyColor2; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(w*0.1,-h); ctx.lineTo(w*0.1,-h*1.75); ctx.stroke();

    // Hood line
    ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(w*0.45,-h); ctx.lineTo(w,-h*0.5); ctx.stroke();

    // Highlight
    ctx.fillStyle='rgba(255,255,255,0.12)';
    ctx.beginPath(); ctx.roundRect(-w,-h,w*2,h*0.4,4); ctx.fill();

    // Bumpers
    ctx.fillStyle=vdef.bodyColor2; ctx.lineWidth=0;
    ctx.fillRect(-w,h*0.2,w*0.25,h*0.35);
    ctx.fillRect(w*0.75,h*0.2,w*0.25,h*0.35);

    // Headlights
    const hlg = ctx.createRadialGradient(w+2,-h*0.1,0,w+2,-h*0.1,8);
    hlg.addColorStop(0,'rgba(255,255,200,0.9)'); hlg.addColorStop(1,'rgba(255,255,200,0)');
    ctx.fillStyle=hlg; ctx.beginPath(); ctx.arc(w+2,-h*0.1,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,200,0.9)';
    ctx.beginPath(); ctx.roundRect(w-2,-h*0.25,6,h*0.3,2); ctx.fill();
  }

  _drawPickup(ctx, vdef) {
    const w=52, h=20;
    // Body
    const bg=ctx.createLinearGradient(0,-h,0,h);
    bg.addColorStop(0,vdef.bodyColor); bg.addColorStop(1,vdef.bodyColor2);
    ctx.fillStyle=bg;
    ctx.beginPath(); ctx.roundRect(-w,-h,w*2,h*1.5,5); ctx.fill();

    // Cab
    ctx.fillStyle=bg;
    ctx.beginPath();
    ctx.moveTo(-w*0.05,-h); ctx.lineTo(w*0.48,-h);
    ctx.lineTo(w*0.32,-h*2); ctx.lineTo(-w*0.05,-h*2); ctx.closePath(); ctx.fill();

    // Bed
    ctx.fillStyle=vdef.bodyColor2;
    ctx.beginPath(); ctx.roundRect(-w,-h,w*0.6,h*0.5,2); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(-w*0.4,-h); ctx.lineTo(-w*0.4,-h*0.5); ctx.stroke();

    // Window
    ctx.fillStyle='rgba(180,220,255,0.7)';
    ctx.beginPath();
    ctx.moveTo(w*0.0,-h); ctx.lineTo(w*0.42,-h);
    ctx.lineTo(w*0.28,-h*1.9); ctx.lineTo(w*0.0,-h*1.9); ctx.closePath(); ctx.fill();

    ctx.fillStyle='rgba(255,255,255,0.12)';
    ctx.beginPath(); ctx.roundRect(-w,-h,w*2,h*0.4,4); ctx.fill();
  }

  _drawMonster(ctx, vdef) {
    const w=52, h=26;
    // Chassis
    const bg=ctx.createLinearGradient(0,-h,0,h*0.5);
    bg.addColorStop(0,vdef.bodyColor); bg.addColorStop(1,vdef.bodyColor2);
    ctx.fillStyle=bg;
    ctx.beginPath(); ctx.roundRect(-w,-h,w*2,h*1.4,6); ctx.fill();

    // Roll cage
    ctx.strokeStyle='rgba(80,80,80,0.6)'; ctx.lineWidth=3;
    ctx.strokeRect(-w*0.7,-h*1.5,w*1.4,h*0.6);
    ctx.beginPath(); ctx.moveTo(-w*0.7,-h*1.5); ctx.lineTo(-w*0.4,-h*1.5-h*0.3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(w*0.7,-h*1.5); ctx.lineTo(w*0.4,-h*1.5-h*0.3); ctx.stroke();

    // Cab
    ctx.fillStyle=bg;
    ctx.beginPath();
    ctx.moveTo(-w*0.35,-h); ctx.lineTo(w*0.35,-h);
    ctx.lineTo(w*0.25,-h*1.9); ctx.lineTo(-w*0.25,-h*1.9); ctx.closePath(); ctx.fill();

    // Windows
    ctx.fillStyle='rgba(180,220,255,0.5)';
    ctx.beginPath();
    ctx.moveTo(-w*0.28,-h); ctx.lineTo(w*0.28,-h);
    ctx.lineTo(w*0.2,-h*1.8); ctx.lineTo(-w*0.2,-h*1.8); ctx.closePath(); ctx.fill();

    ctx.fillStyle='rgba(255,255,255,0.1)';
    ctx.beginPath(); ctx.roundRect(-w,-h,w*2,h*0.4,5); ctx.fill();

    // Exhaust pipes
    ctx.fillStyle='#555';
    ctx.fillRect(w*0.35,-h*1.7,5,h*0.7);
    ctx.fillRect(w*0.35+8,-h*1.5,4,h*0.5);
  }

  _drawBike(ctx, vdef) {
    // Frame
    ctx.strokeStyle=vdef.bodyColor; ctx.lineWidth=6;
    ctx.beginPath();
    ctx.moveTo(22,-4); ctx.lineTo(-22,-4);
    ctx.moveTo(0,-4); ctx.lineTo(-5,-24);
    ctx.moveTo(-5,-24); ctx.lineTo(20,-4);
    ctx.stroke();

    // Engine block
    ctx.fillStyle=vdef.bodyColor2;
    ctx.beginPath(); ctx.roundRect(-10,-16,20,14,3); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.1)';
    ctx.beginPath(); ctx.roundRect(-10,-16,20,5,3); ctx.fill();

    // Handlebars
    ctx.strokeStyle='#666'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.moveTo(18,-22); ctx.lineTo(24,-18); ctx.stroke();
    ctx.strokeStyle='#444';
    ctx.beginPath(); ctx.moveTo(18,-22); ctx.lineTo(18,-12); ctx.stroke();

    // Seat
    const sg2=ctx.createLinearGradient(-12,-30,12,-22);
    sg2.addColorStop(0,'#222'); sg2.addColorStop(1,'#444');
    ctx.fillStyle=sg2;
    ctx.beginPath(); ctx.roundRect(-16,-30,28,8,4); ctx.fill();

    // Fairing
    const fg=ctx.createLinearGradient(0,-28,0,-8);
    fg.addColorStop(0,vdef.bodyColor); fg.addColorStop(1,vdef.bodyColor2);
    ctx.fillStyle=fg;
    ctx.beginPath();
    ctx.moveTo(22,-4); ctx.lineTo(28,-12); ctx.lineTo(22,-24); ctx.lineTo(14,-24); ctx.lineTo(14,-4);
    ctx.closePath(); ctx.fill();

    // Headlight
    ctx.fillStyle='rgba(255,255,200,0.9)';
    ctx.beginPath(); ctx.arc(26,-16,5,0,Math.PI*2); ctx.fill();
  }

  drawParticles(ps, camX, camY) {
    ps.draw(this.ctx, camX, camY);
  }

  drawVignette() {
    const ctx = this.ctx;
    const vg = ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.8);
    vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.4)');
    ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
  }

  clear() {
    this.ctx.clearRect(0,0,W,H);
    this.bgCtx.clearRect(0,0,W,H);
  }
}

// ═══════════════════════════════════════════════════════
// MENU RENDERER (canvas decorations)
// ═══════════════════════════════════════════════════════
function drawMenuBg(canvas) {
  const ctx = canvas.getContext('2d');
  canvas.width = W; canvas.height = H;
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#1B5E20'); g.addColorStop(0.6,'#2E7D32'); g.addColorStop(1,'#1a3a0a');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // Hills
  const hills=[
    {y:H*0.4,w:300,h:120,c:'rgba(0,0,0,0.15)'},
    {y:H*0.5,w:400,h:100,c:'rgba(0,0,0,0.1)'},
    {y:H*0.7,w:500,h:80,c:'rgba(0,0,0,0.08)'}
  ];
  for (const hill of hills) {
    ctx.fillStyle=hill.c;
    ctx.beginPath();
    ctx.ellipse(W*0.5,hill.y,hill.w,hill.h,0,0,Math.PI*2);
    ctx.fill();
  }
  // Stars
  for (let i=0;i<30;i++) {
    ctx.fillStyle='rgba(255,255,255,'+(.1+Math.random()*.2)+')';
    ctx.beginPath(); ctx.arc(Math.random()*W, Math.random()*H*0.4, 1+Math.random(), 0, Math.PI*2); ctx.fill();
  }
  // Sun
  const sg=ctx.createRadialGradient(W*0.75,H*0.12,0,W*0.75,H*0.12,60);
  sg.addColorStop(0,'rgba(255,230,150,0.8)'); sg.addColorStop(1,'rgba(255,180,50,0)');
  ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(W*0.75,H*0.12,60,0,Math.PI*2); ctx.fill();
}

function drawMenuCar(canvas) {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,260,100);
  const vdef = VEHICLES.find(v=>v.id===save.selectedVehicle) || VEHICLES[0];
  const renderer = {_drawJeep, _drawPickup, _drawMonster, _drawBike};

  ctx.save();
  ctx.translate(130, 65);

  // Wheels
  const wr = getWheelR(vdef.id);
  drawWheelSimple(ctx, -42, 20, wr, 0, vdef);
  drawWheelSimple(ctx, 42, 20, wr, 0, vdef);

  // Body
  const drawFn = {
    'jeep': drawJeepSimple, 'pickup': drawPickupSimple,
    'monster': drawMonsterSimple, 'bike': drawBikeSimple
  }[vdef.id] || drawJeepSimple;
  drawFn(ctx, vdef);

  ctx.restore();
}

function drawWheelSimple(ctx, x, y, r, angle, vdef) {
  ctx.fillStyle=vdef.wheelColor; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(60,60,60,0.8)'; ctx.lineWidth=r*0.15;
  ctx.beginPath(); ctx.arc(x,y,r*0.92,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle=vdef.rimColor; ctx.beginPath(); ctx.arc(x,y,r*0.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#aaa'; ctx.beginPath(); ctx.arc(x,y,r*0.12,0,Math.PI*2); ctx.fill();
}
function drawJeepSimple(ctx, vdef) {
  const w=50,h=20;
  const bg=ctx.createLinearGradient(0,-h,0,h);
  bg.addColorStop(0,vdef.bodyColor); bg.addColorStop(1,vdef.bodyColor2);
  ctx.fillStyle=bg; ctx.beginPath(); ctx.roundRect(-w,-h,w*2,h*1.5,5); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-w*0.35,-h); ctx.lineTo(w*0.45,-h); ctx.lineTo(w*0.3,-h*1.9); ctx.lineTo(-w*0.2,-h*1.9); ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(180,220,255,0.7)';
  ctx.beginPath(); ctx.moveTo(-w*0.15,-h); ctx.lineTo(w*0.38,-h); ctx.lineTo(w*0.25,-h*1.75); ctx.lineTo(-w*0.05,-h*1.75); ctx.closePath(); ctx.fill();
}
function drawPickupSimple(ctx, vdef) {
  const w=52,h=20;
  const bg=ctx.createLinearGradient(0,-h,0,h);
  bg.addColorStop(0,vdef.bodyColor); bg.addColorStop(1,vdef.bodyColor2);
  ctx.fillStyle=bg; ctx.beginPath(); ctx.roundRect(-w,-h,w*2,h*1.5,5); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-w*0.05,-h); ctx.lineTo(w*0.48,-h); ctx.lineTo(w*0.32,-h*2); ctx.lineTo(-w*0.05,-h*2); ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(180,220,255,0.7)';
  ctx.beginPath(); ctx.moveTo(w*0.0,-h); ctx.lineTo(w*0.42,-h); ctx.lineTo(w*0.28,-h*1.9); ctx.lineTo(w*0.0,-h*1.9); ctx.closePath(); ctx.fill();
}
function drawMonsterSimple(ctx, vdef) {
  const w=52,h=26;
  const bg=ctx.createLinearGradient(0,-h,0,h*0.5);
  bg.addColorStop(0,vdef.bodyColor); bg.addColorStop(1,vdef.bodyColor2);
  ctx.fillStyle=bg; ctx.beginPath(); ctx.roundRect(-w,-h,w*2,h*1.4,6); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-w*0.35,-h); ctx.lineTo(w*0.35,-h); ctx.lineTo(w*0.25,-h*1.9); ctx.lineTo(-w*0.25,-h*1.9); ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(180,220,255,0.5)';
  ctx.beginPath(); ctx.moveTo(-w*0.28,-h); ctx.lineTo(w*0.28,-h); ctx.lineTo(w*0.2,-h*1.8); ctx.lineTo(-w*0.2,-h*1.8); ctx.closePath(); ctx.fill();
}
function drawBikeSimple(ctx, vdef) {
  ctx.strokeStyle=vdef.bodyColor; ctx.lineWidth=6;
  ctx.beginPath(); ctx.moveTo(22,-4); ctx.lineTo(-22,-4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-4); ctx.lineTo(-5,-24); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-5,-24); ctx.lineTo(20,-4); ctx.stroke();
  ctx.fillStyle=vdef.bodyColor2; ctx.beginPath(); ctx.roundRect(-10,-16,20,14,3); ctx.fill();
  const fg=ctx.createLinearGradient(0,-28,0,-8);
  fg.addColorStop(0,vdef.bodyColor); fg.addColorStop(1,vdef.bodyColor2);
  ctx.fillStyle=fg;
  ctx.beginPath(); ctx.moveTo(22,-4); ctx.lineTo(28,-12); ctx.lineTo(22,-24); ctx.lineTo(14,-24); ctx.lineTo(14,-4); ctx.closePath(); ctx.fill();
}

let renderer = null;
let terrain = null;
let vehicle = null;
let particles = null;
let camX = 0, camY = 0;
let sessionCoins = 0;
let inputGas = false, inputBrake = false;
let paused = false;

const app = document.getElementById('app');
const bgCanvas = document.getElementById('bgCanvas');
const gameCanvas = document.getElementById('gameCanvas');

function resizeApp() {
  const sw = window.innerWidth, sh = window.innerHeight;
  const scale = Math.min(sw/W, sh/H);
  app.style.width = W+'px';
  app.style.height = H+'px';
  app.style.transform = `scale(${scale})`;
  app.style.transformOrigin = 'center center';
  // Portrait warning (only on actual mobile touch devices)
  const isTouch = 'ontouchstart' in window;
  const isPortrait = sw < sh;
  const overlay = document.getElementById('rotateOverlay');
  if (isTouch && isPortrait) overlay.classList.add('show');
  else overlay.classList.remove('show');
}
window.addEventListener('resize', resizeApp);
window.addEventListener('orientationchange', ()=>setTimeout(resizeApp,200));
resizeApp();

renderer = new Renderer(gameCanvas, bgCanvas);

function refreshGarageUI() {
  document.getElementById('garageCoins').textContent = `🪙 ${save.coins}`;

  const vcEl = document.getElementById('vehicleCards');
  vcEl.innerHTML='';
  for (const vd of VEHICLES) {
    const vSave = save.vehicles[vd.id];
    const card = document.createElement('div');
    card.className='v-card'+(save.selectedVehicle===vd.id?' selected':'')+(vSave.locked?' locked':'');
    const previewCanvas = document.createElement('canvas');
    previewCanvas.width=110; previewCanvas.height=50; previewCanvas.style.display='block';
    card.innerHTML=`<div class="v-card-name">${vd.name}</div>`;
    card.prepend(previewCanvas);
    // Draw vehicle preview
    const pc = previewCanvas.getContext('2d');
    pc.save(); pc.translate(55,38);
    const sc=getVehicleScale(vd.id)*0.55;
    pc.scale(sc,sc);
    drawWheelSimple(pc,-42,20,getWheelR(vd.id),0,vd);
    drawWheelSimple(pc,42,20,getWheelR(vd.id),0,vd);
    const dfn={jeep:drawJeepSimple,pickup:drawPickupSimple,monster:drawMonsterSimple,bike:drawBikeSimple}[vd.id]||drawJeepSimple;
    dfn(pc,vd);
    pc.restore();
    if (vSave.locked) {
      const p=document.createElement('div');
      p.className='v-card-price'; p.textContent=`🪙 ${vd.price}`;
      card.appendChild(p);
    }
    card.addEventListener('click',()=>{
      if (vSave.locked) {
        if (save.coins >= vd.price) {
          save.coins -= vd.price;
          save.vehicles[vd.id].locked = false;
          save.selectedVehicle = vd.id;
          writeSave();
          playBuySound();
          showToast(`${vd.name} unlocked!`);
          refreshGarageUI();
        } else {
          showToast(`Need 🪙 ${vd.price} coins!`);
          playBeep(220,0.2,0.3,'sawtooth');
        }
      } else {
        save.selectedVehicle = vd.id;
        writeSave(); playButtonSound(); refreshGarageUI();
      }
    });
    vcEl.appendChild(card);
  }

  // Preview
  const prev = document.getElementById('garagePreview');
  prev.width=300; prev.height=90;
  const pc=prev.getContext('2d');
  pc.clearRect(0,0,300,90);
  const vd=VEHICLES.find(v=>v.id===save.selectedVehicle)||VEHICLES[0];
  pc.save(); pc.translate(150,68);
  const sc=getVehicleScale(vd.id)*0.75;
  pc.scale(sc,sc);
  drawWheelSimple(pc,-42,20,getWheelR(vd.id),0,vd);
  drawWheelSimple(pc,42,20,getWheelR(vd.id),0,vd);
  const dfn={jeep:drawJeepSimple,pickup:drawPickupSimple,monster:drawMonsterSimple,bike:drawBikeSimple}[vd.id]||drawJeepSimple;
  dfn(pc,vd);
  pc.restore();

  // Upgrades
  const vSave = save.vehicles[save.selectedVehicle];
  const ugEl = document.getElementById('upgradesGrid');
  ugEl.innerHTML='';
  for (const upg of UPGRADES_DEF) {
    const lvl = vSave[upg.id]||0;
    const maxed = lvl >= upg.maxLvl;
    const cost = Math.round(upg.baseCost * Math.pow(upg.costMult, lvl));
    const canBuy = !maxed && save.coins >= cost && !vSave.locked;
    const card = document.createElement('div');
    card.className='upg-card'+(maxed?' maxed':'');
    let barsHtml='';
    for (let i=0;i<upg.maxLvl;i++) barsHtml+=`<div class="upg-bar${i<lvl?' filled':''}"></div>`;
    card.innerHTML=`
      <div class="upg-icon">${upg.icon}</div>
      <div class="upg-name">${upg.name}</div>
      <div class="upg-bars">${barsHtml}</div>
      ${maxed
        ? '<div class="upg-cost maxed-lbl">MAX</div>'
        : `<div class="upg-cost"${canBuy?'':' style="opacity:.4"'}>🪙 ${cost}</div>`
      }
    `;
    if (!maxed) {
      card.addEventListener('click',()=>{
        const c2=Math.round(upg.baseCost*Math.pow(upg.costMult,vSave[upg.id]||0));
        if (save.coins>=c2 && !vSave.locked) {
          save.coins-=c2;
          save.vehicles[save.selectedVehicle][upg.id]=(vSave[upg.id]||0)+1;
          writeSave(); playBuySound(); refreshGarageUI();
        } else if (vSave.locked) {
          showToast('Unlock this vehicle first!');
        } else {
          showToast(`Need 🪙 ${c2} coins!`);
          playBeep(220,0.2,0.3,'sawtooth');
        }
      });
    }
    ugEl.appendChild(card);
  }
}

// ═══════════════════════════════════════════════════════
// START GAME
// ═══════════════════════════════════════════════════════
function startGame() {
  currentState = STATE.GAME;
  paused = false;
  sessionCoins = 0;
  nextMilestoneIdx = 0;

  const envDef = ENVS.find(e=>e.id===save.selectedEnv) || ENVS[0];
  const vDef = VEHICLES.find(v=>v.id===save.selectedVehicle) || VEHICLES[0];
  const vSave = save.vehicles[vDef.id];
  const upgrades = {
    engine: vSave.engine||0,
    susp:   vSave.susp||0,
    fuel:   vSave.fuel||0,
    tires:  vSave.tires||0,
    fwd:    vSave.fwd||0,
    turbo:  vSave.turbo||0
  };

  terrain = new Terrain(envDef, Math.floor(Math.random()*99999));
  particles = new ParticleSystem();

  const startY = terrain.getY(150) - getWheelR(vDef.id) - 60;
  vehicle = new Vehicle(vDef, upgrades, envDef, 150, startY);

  camX = 0; camY = 0;
  exhaustTimer = 0;

  showGame();
  updateHUD();

  startEngineSound();
  lastTime = performance.now();
  if (animFrame) cancelAnimationFrame(animFrame);
  gameLoop();
}

// ═══════════════════════════════════════════════════════
// MAIN GAME LOOP
// ═══════════════════════════════════════════════════════
function gameLoop() {
  if (currentState !== STATE.GAME || paused) return;
  animFrame = requestAnimationFrame(gameLoop);

  const now = performance.now();
  let dt = Math.min((now - lastTime)/1000, 0.05);
  lastTime = now;

  // Physics (fixed ~60fps steps)
  const steps = Math.max(1, Math.round(dt * 60));
  for (let i=0; i<steps; i++) {
    if (!vehicle.crashed) {
      vehicle.update(terrain, inputGas, inputBrake);
    }
    particles.update();
  }

  // Check out of fuel
  if (vehicle.outOfFuel && !vehicle.crashed) {
    vehicle.crashed = true;
    vehicle.crashReason = 'OUT OF FUEL!';
  }

  // Exhaust particles
  if (inputGas && !vehicle.crashed) {
    exhaustTimer++;
    if (exhaustTimer % 3 === 0) {
      const c = Math.cos(vehicle.angle), s2 = Math.sin(vehicle.angle);
      const ex = vehicle.bx + vehicle.ra.x*c - vehicle.ra.y*s2;
      const ey = vehicle.by + vehicle.ra.x*s2 + vehicle.ra.y*c;
      particles.emit(ex, ey, 2, {
        angle: vehicle.angle + Math.PI + (Math.random()-0.5)*0.5,
        speed: 2+Math.random()*2,
        decay: 0.04+Math.random()*0.02,
        r: 3+Math.random()*3,
        color: vehicle.turboActive ? '#00ccff' : `rgba(${160+Math.random()*40|0},${100+Math.random()*40|0},${60+Math.random()*40|0},0.8)`,
        gravity: 0.05,
        upward: 0.5
      });
    }
  }

  // Wheel dust particles on ground
  if ((vehicle.rOnGround || vehicle.fOnGround) && Math.abs(vehicle.rvx) > 3) {
    if (exhaustTimer % 4 === 0) {
      const wx = vehicle.rOnGround ? vehicle.rx : vehicle.fx;
      const wy = vehicle.rOnGround ? vehicle.ry : vehicle.fy;
      const env2 = ENVS.find(e=>e.id===save.selectedEnv)||ENVS[0];
      particles.emit(wx,wy+vehicle.wr,3,{
        angle:-Math.PI/2+(Math.random()-0.5)*1.0,
        speed:1+Math.random()*2,
        decay:0.05,r:2+Math.random()*3,
        color:env2.dirtColor,gravity:-0.02,upward:1.5
      });
    }
  }

  // Coin collection
  const dist_sq=(a,b)=>(a.x-b.x)**2+(a.y-b.y)**2;
  for (const obj of terrain.objects) {
    if (obj.collected) continue;
    const d2w = dist_sq({x:vehicle.fx,y:vehicle.fy},{x:obj.x,y:obj.y});
    const d2r = dist_sq({x:vehicle.rx,y:vehicle.ry},{x:obj.x,y:obj.y});
    const d2b = dist_sq({x:vehicle.bx,y:vehicle.by},{x:obj.x,y:obj.y});
    const minD = Math.min(d2w,d2r,d2b);
    if (obj.type==='coin' && minD < (COIN_R+vehicle.wr*1.2)**2) {
      obj.collected = true;
      sessionCoins++;
      playCoinSound();
      // Floating text
      const coinEl = document.createElement('div');
      coinEl.className='coin-popup';
      coinEl.style.left=(obj.x-camX-10)+'px';
      coinEl.style.top=(obj.y-camY-10)+'px';
      coinEl.textContent='+1';
      app.appendChild(coinEl);
      setTimeout(()=>coinEl.remove(),1000);
      particles.emit(obj.x,obj.y,6,{
        speed:2.5,decay:0.05,r:3,
        color:'#ffd700',gravity:0.05,upward:1,spread:Math.PI*2
      });
    } else if (obj.type==='fuel' && minD < (GAS_CANISTER_R+vehicle.wr*1.2)**2) {
      obj.collected = true;
      vehicle.fuel = Math.min(vehicle.fuelMax, vehicle.fuel + vehicle.fuelMax*0.5);
      vehicle.outOfFuel = false;
      playFuelSound();
      showToast('⛽ FUEL +50%');
      particles.emit(obj.x,obj.y,8,{
        speed:3,decay:0.04,r:4,
        color:'#ff6600',gravity:0.03,upward:2,spread:Math.PI*2
      });
    }
  }

  // Camera follow (smooth)
  const targetCamX = vehicle.bx - W * 0.35;
  const targetCamY = vehicle.by - H * 0.5;
  camX += (targetCamX - camX) * 0.1;
  camY += (targetCamY - camY) * 0.1;

  // Milestone check
  const dist = Math.floor(vehicle.distance);
  if (nextMilestoneIdx < milestones.length && dist >= milestones[nextMilestoneIdx]) {
    showMilestone(milestones[nextMilestoneIdx]);
    nextMilestoneIdx++;
    // Unlock environments
    const env2 = ENVS.find(e=>e.unlockDist<=dist && !save.envUnlocks[e.id]);
    if (env2) {
      save.envUnlocks[env2.id]=true;
      writeSave();
      setTimeout(()=>showToast(`🗺 ${env2.name} UNLOCKED!`), 2000);
    }
  }

  // Engine sound
  const spd = Math.abs(vehicle.bvx);
  setEngineRPM(Math.min(1, spd/12 + (inputGas?0.3:0)));

  // HUD update
  updateHUD();

  // Ensure terrain generated ahead of camera
  terrain.ensureGenerated(camX + W*2);

  // Render
  renderer.clear();
  const env3 = ENVS.find(e=>e.id===save.selectedEnv)||ENVS[0];
  renderer.drawBackground(env3, camX, camY);
  renderer.drawTerrain(terrain, env3, camX, camY);
  renderer.drawObjects(terrain, camX, camY);
  renderer.drawParticles(particles, camX, camY);
  renderer.drawVehicle(vehicle, camX, camY);
  renderer.drawVignette();

  // Crash
  if (vehicle.crashed === true) {
    stopEngineSound();
    playCrashSound();
    particles.emit(vehicle.bx, vehicle.by, 20, {
      speed:5,decay:0.025,r:5,
      color:'#ff4400',gravity:0.1,upward:3,spread:Math.PI*2
    });
    particles.emit(vehicle.bx, vehicle.by, 10, {
      speed:3,decay:0.03,r:3,
      color:'#ffaa00',gravity:0.08,upward:2,spread:Math.PI*2
    });
    setTimeout(()=>endGame(vehicle.crashReason||'CRASHED!'), 800);
    vehicle.crashed = 'handled';
  }
}

function updateHUD() {
  const dist = Math.floor(vehicle.distance);
  document.getElementById('hudDist').textContent = dist + ' m';
  document.getElementById('hudCoins').textContent = sessionCoins;
  const fuelPct = (vehicle.fuel / vehicle.fuelMax) * 100;
  document.getElementById('fuelFill').style.height = fuelPct + '%';
  document.getElementById('fuelFill').style.background =
    fuelPct < 20 ? 'linear-gradient(180deg,#ff4400,#cc2200)' :
    fuelPct < 40 ? 'linear-gradient(180deg,#ffaa00,#cc7700)' :
    'linear-gradient(180deg,#66ff44,#33cc00)';
  const spd = Math.round(Math.abs(vehicle.bvx) * 18);
  document.getElementById('hudSpeed').textContent = spd;
}

function endGame(reason) {
  currentState = STATE.GAMEOVER;
  cancelAnimationFrame(animFrame);

  save.coins += sessionCoins;
  const dist = Math.floor(vehicle.distance);
  const newBest = dist > save.bestDist;
  if (newBest) save.bestDist = dist;
  writeSave();

  // Show game over screen
  const goScreen = document.getElementById('gameoverScreen');
  goScreen.classList.add('active');
  drawMenuBg(document.getElementById('gameoverBg'));
  document.getElementById('goReason').textContent = reason;
  document.getElementById('goDist').textContent = dist + ' m';
  document.getElementById('goCoins').textContent = sessionCoins;
  document.getElementById('goBest').textContent = newBest
    ? `🏆 NEW BEST: ${dist} m!`
    : `BEST: ${save.bestDist} m`;
}

// ═══════════════════════════════════════════════════════
// TOAST & MILESTONE

let toastTimer = null;

  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.opacity = '1';
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ el.style.opacity='0'; }, 2000);
}

let milestoneTimer = null;
function showMilestone(m) {
  playMilestoneSound();
  const el = document.getElementById('milestone');
  document.getElementById('milestoneM').textContent = m+'m';
  document.getElementById('milestoneSub').textContent = 'MILESTONE!';
  el.style.opacity='1';
  if (milestoneTimer) clearTimeout(milestoneTimer);
  milestoneTimer = setTimeout(()=>{ el.style.opacity='0'; }, 2000);
}

// ═══════════════════════════════════════════════════════
// INPUT HANDLING
// ═══════════════════════════════════════════════════════
const btnGasEl = document.getElementById('btnGas');
const btnBrakeEl = document.getElementById('btnBrake');

function setGas(v) { inputGas=v; btnGasEl.classList.toggle('pressed',v); }
function setBrake(v) { inputBrake=v; btnBrakeEl.classList.toggle('pressed',v); }

btnGasEl.addEventListener('touchstart', e=>{e.preventDefault();setGas(true);getAudioCtx();},{passive:false});
btnGasEl.addEventListener('touchend',   e=>{e.preventDefault();setGas(false);},{passive:false});
btnBrakeEl.addEventListener('touchstart',e=>{e.preventDefault();setBrake(true);getAudioCtx();},{passive:false});
btnBrakeEl.addEventListener('touchend',  e=>{e.preventDefault();setBrake(false);},{passive:false});
btnGasEl.addEventListener('mousedown',  ()=>setGas(true));
btnGasEl.addEventListener('mouseup',    ()=>setGas(false));
btnBrakeEl.addEventListener('mousedown',()=>setBrake(true));
btnBrakeEl.addEventListener('mouseup',  ()=>setBrake(false));

window.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='d') setGas(true);
  if(e.key==='ArrowLeft'||e.key==='a')  setBrake(true);
  if(e.key==='Escape'||e.key==='p') togglePause();
});
window.addEventListener('keyup',e=>{
  if(e.key==='ArrowRight'||e.key==='d') setGas(false);
  if(e.key==='ArrowLeft'||e.key==='a')  setBrake(false);
});

function togglePause() {
  if (currentState !== STATE.GAME && currentState !== STATE.PAUSE) return;
  paused = !paused;
  document.getElementById('pauseScreen').classList.toggle('active', paused);
  if (paused) { stopEngineSound(); }
  else {
    startEngineSound();
    lastTime = performance.now();
    gameLoop();
  }
}

// ═══════════════════════════════════════════════════════
// BUTTON WIRING
// ═══════════════════════════════════════════════════════
document.getElementById('btnPlay').addEventListener('click', ()=>{
  playButtonSound(); getAudioCtx(); startGame();
});
document.getElementById('btnGarage').addEventListener('click', ()=>{
  playButtonSound(); initGarage();
});
document.getElementById('btnEnvSelect').addEventListener('click', ()=>{
  playButtonSound(); initEnvSelect();
});
document.getElementById('btnEnvBack').addEventListener('click', ()=>{
  playButtonSound(); initMenu();
});
document.getElementById('btnGarageBack').addEventListener('click', ()=>{
  playButtonSound(); initMenu();
});
document.getElementById('pauseBtn').addEventListener('click', togglePause);
document.getElementById('btnResume').addEventListener('click', togglePause);
document.getElementById('btnPauseMenu').addEventListener('click', ()=>{
  paused=false; stopEngineSound(); cancelAnimationFrame(animFrame);
  currentState=STATE.MENU; initMenu();
});
document.getElementById('btnRestart').addEventListener('click', ()=>{
  playButtonSound(); startGame();
});
document.getElementById('btnGoMenu').addEventListener('click', ()=>{
  playButtonSound(); initMenu();
});

// ═══════════════════════════════════════════════════════
// SERVICE WORKER (PWA offline support)
// ═══════════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}

// ═══════════════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════════════
// Update env unlocks based on saved best
for (const env of ENVS) {
  if (save.bestDist >= env.unlockDist) save.envUnlocks[env.id]=true;
}
writeSave();
initMenu();
</script>
