<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;user-select:none;background:#111;display:flex;justify-content:center;align-items:center;font-family:'Arial Rounded MT Bold',Arial,sans-serif}
#wrap{position:relative;overflow:hidden;background:#87ceeb}
canvas{display:block;position:absolute;top:0;left:0;width:100%;height:100%}
#ui{position:absolute;inset:0;pointer-events:none}

/* HUD */
#hud{position:absolute;top:0;left:0;right:0;padding:10px 14px 8px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,rgba(0,0,0,.45) 0,transparent 100%);z-index:10}
.hud-block{display:flex;flex-direction:column;align-items:center;gap:2px}
.hud-lbl{font-size:8px;letter-spacing:3px;color:rgba(255,255,255,.5);text-transform:uppercase}
.hud-val{font-size:20px;font-weight:900;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.5);line-height:1}
.hud-val.gold{color:#ffe500;text-shadow:0 0 10px rgba(255,200,0,.5)}

/* Fuel bar */
#fuelWrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;max-width:140px}
#fuelTrack{width:100%;height:10px;background:rgba(0,0,0,.35);border-radius:5px;overflow:hidden;border:1px solid rgba(255,255,255,.15)}
#fuelBar{height:100%;border-radius:5px;transition:width .12s,background .3s}
.fuel-lbl{font-size:7px;letter-spacing:3px;color:rgba(255,255,255,.4)}

/* Controls */
#controls{position:absolute;bottom:0;left:0;right:0;height:130px;display:flex;pointer-events:all;z-index:20}
.cbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .08s;user-select:none;border:none;outline:none}
#cBrake{background:rgba(220,50,50,.18);border-right:1px solid rgba(255,255,255,.06)}
#cBrake.act{background:rgba(220,50,50,.4)}
#cGas{background:rgba(50,200,80,.18)}
#cGas.act{background:rgba(50,200,80,.38)}
.cbtn-icon{font-size:44px;opacity:.6}
.cbtn-lbl{font-size:9px;letter-spacing:4px;color:rgba(255,255,255,.35);text-transform:uppercase}

/* Screens */
.scr{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:30;pointer-events:all}
.scr.on{display:flex}

/* Menu */
#menuSky{position:absolute;inset:0;background:linear-gradient(180deg,#56ccf2 0%,#a8e063 100%)}
.m-logo{position:relative;z-index:2;text-align:center;margin-bottom:8px}
.m-logo-t{font-size:54px;font-weight:900;color:#fff;text-shadow:0 5px 0 #2d7d32,0 0 40px rgba(80,200,40,.4);letter-spacing:3px}
.m-logo-s{font-size:11px;letter-spacing:6px;color:rgba(255,255,255,.6);margin-top:4px}
.m-car-wrap{position:relative;z-index:2;margin:12px 0 20px}
.gbtn{border:none;outline:none;cursor:pointer;font-family:inherit;font-weight:900;letter-spacing:2px;text-transform:uppercase;transition:transform .1s;position:relative;z-index:2}
.gbtn:active{transform:scale(.93)!important}
.gbtn-big{background:linear-gradient(180deg,#56e04a,#2ea829);color:#fff;font-size:24px;padding:18px 0;border-radius:20px;width:240px;box-shadow:0 7px 0 #1a6614,0 0 24px rgba(60,200,40,.4);margin-bottom:16px}
.gbtn-med{background:rgba(255,255,255,.2);color:#fff;font-size:13px;padding:13px 0;border-radius:14px;width:200px;border:2px solid rgba(255,255,255,.3);margin-bottom:10px}
.m-best{position:relative;z-index:2;font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.5);margin-top:8px}

/* Garage */
#grgBg{position:absolute;inset:0;background:linear-gradient(180deg,#1a1a2e,#16213e)}
.g-wrap{position:relative;z-index:2;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;padding:18px 14px;overflow-y:auto}
.g-title{font-size:10px;letter-spacing:5px;color:rgba(255,255,255,.4);margin-bottom:4px}
.g-coins{font-size:18px;font-weight:900;color:#ffe500;margin-bottom:14px}
.v-row{display:flex;gap:10px;width:100%;overflow-x:auto;padding-bottom:6px;margin-bottom:12px}
.v-row::-webkit-scrollbar{display:none}
.v-card{flex-shrink:0;width:100px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);border-radius:14px;padding:8px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;transition:all .14s}
.v-card.sel{border-color:#56e04a;background:rgba(86,224,74,.1);box-shadow:0 0 18px rgba(86,224,74,.2)}
.v-card.lck{opacity:.45}
.v-cname{font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.6);text-transform:uppercase}
.v-cprice{font-size:11px;color:#ffe500;font-weight:900}
.upg-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%}
.upg-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .12s}
.upg-card:active{transform:scale(.95)}
.upg-icon{font-size:22px}
.upg-name{font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.5);text-transform:uppercase;text-align:center}
.upg-dots{display:flex;gap:3px}
.upg-dot{width:14px;height:5px;border-radius:3px;background:rgba(255,255,255,.1)}
.upg-dot.on{background:#56e04a;box-shadow:0 0 5px rgba(86,224,74,.7)}
.upg-cost{font-size:12px;font-weight:900;color:#ffe500}

/* Game Over */
#goBg{position:absolute;inset:0;background:rgba(0,0,0,.72)}
.go-card{position:relative;z-index:2;background:rgba(15,20,40,.9);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:28px 28px;display:flex;flex-direction:column;align-items:center;gap:12px;min-width:270px;backdrop-filter:blur(8px)}
.go-over{font-size:11px;letter-spacing:5px;color:rgba(255,255,255,.4)}
.go-reason{font-size:22px;font-weight:900;color:#ff5252;letter-spacing:1px}
.go-hr{width:100%;height:1px;background:rgba(255,255,255,.1)}
.go-stats{display:flex;justify-content:space-around;width:100%}
.go-stat{display:flex;flex-direction:column;align-items:center;gap:3px}
.go-stat-l{font-size:8px;letter-spacing:3px;color:rgba(255,255,255,.35)}
.go-stat-v{font-size:26px;font-weight:900;color:#fff}
.go-stat-v.g{color:#ffe500}
.go-best{font-size:10px;color:rgba(255,180,0,.7);letter-spacing:2px}

/* Pause */
#pauseBg{position:absolute;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(3px)}
.pause-t{position:relative;z-index:2;font-size:32px;font-weight:900;color:#fff;letter-spacing:4px;margin-bottom:28px}

/* Toast */
#toast{position:absolute;top:90px;left:50%;transform:translateX(-50%);z-index:50;background:rgba(0,0,0,.8);color:#fff;padding:9px 18px;border-radius:10px;font-size:11px;letter-spacing:2px;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap}
/* Milestone */
#mile{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:40;text-align:center;pointer-events:none;opacity:0;transition:opacity .3s}
.mile-n{font-size:40px;font-weight:900;color:#fff;text-shadow:0 0 30px rgba(255,220,50,.8)}
.mile-s{font-size:9px;letter-spacing:5px;color:rgba(255,255,255,.5);margin-top:4px}
/* Coin popup */
.cpop{position:absolute;pointer-events:none;z-index:35;font-size:14px;font-weight:900;color:#ffe500;text-shadow:0 0 8px rgba(255,200,0,.7);animation:cpopAnim 0.9s ease-out forwards}
@keyframes cpopAnim{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-55px) scale(.7)}}
/* Speed lines */
.sline{position:absolute;pointer-events:none;z-index:5}
</style>
</head>

<script>
'use strict';
// ── roundRect polyfill (Safari < 15.4) ─────────────────
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    r = Math.min(+r||0, Math.abs(w)/2, Math.abs(h)/2);
    this.beginPath();
    this.moveTo(x+r,y); this.lineTo(x+w-r,y);
    this.arcTo(x+w,y,x+w,y+r,r); this.lineTo(x+w,y+h-r);
    this.arcTo(x+w,y+h,x+w-r,y+h,r); this.lineTo(x+r,y+h);
    this.arcTo(x,y+h,x,y+h-r,r); this.lineTo(x,y+r);
    this.arcTo(x,y,x+r,y,r); this.closePath(); return this;
  };
}

// ─────────────────────────────────────────────────────────

canvas.width = W; canvas.height = H;

function resize(){
  const s = Math.min(innerWidth/W, innerHeight/H);
  wrap.style.width  = W+'px';
  wrap.style.height = H+'px';
  wrap.style.transform = `scale(${s})`;
  wrap.style.transformOrigin = 'center center';
}
window.addEventListener('resize', resize);
resize();

// SEEDED RNG
// ─────────────────────────────────────────────────────────
function rng32(seed){ return ()=>{ seed|=0; seed=seed+0x6D2B79F5|0; let t=Math.imul(seed^seed>>>15,1|seed); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }

// ─────────────────────────────────────────────────────────
// SAVE

const SK='hillrush2';
let sv={coins:0, best:0, selV:'jeep', selE:'country',
  vs:{jeep:{locked:false,engine:0,susp:0,fuel:0,tires:0,fwd:0,turbo:0},

const PARTS=[];
function emitParts(x,y,n,opts){
  for(let i=0;i<n;i++){
    const a=(opts.angle||0)+(Math.random()-.5)*(opts.spread||Math.PI*2);
    const s=(opts.speed||2)*(0.5+Math.random()*.5);
    PARTS.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-(opts.up||0),
      life:1,decay:opts.decay||0.03,r:opts.r||3,col:opts.col||'#fff',g:opts.g||0.07});
  }
}
function updateParts(){for(let i=PARTS.length-1;i>=0;i--){const p=PARTS[i];p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.vx*=0.96;p.life-=p.decay;if(p.life<=0)PARTS.splice(i,1);}}
function drawParts(cx,cy){
  for(const p of PARTS){ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x-cx,p.y-cy,p.r*(0.5+p.life*0.5),0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;
}

// ─────────────────────────────────────────────────────────
// TERRAIN
// ─────────────────────────────────────────────────────────
const SEG=55;
class Terrain {
  constructor(env,seed){
    this.env=env; this.rng=rng32(seed||Math.random()*99999|0);
    this.pts=[]; this.objs=[]; this.decos=[]; this.genX=0;
    this._gen(W*3);
  }
  _gen(toX){
    const {hillAmp,hillFreq,roughness,rng}=this; void rng;
    const r=this.rng;
    let x=this.genX;
    let y=x===0?H*0.56:this.pts[this.pts.length-1].y;
    if(x===0){for(let i=0;i<=6;i++)this.pts.push({x:i*SEG,y});x=6*SEG;}
    while(x<toX){
      const seg=SEG*(0.8+r()*0.8);
      const amp=this.env.hillAmp*(0.25+r()*0.9)*this.env.roughness;
      const dir=r()>.45?1:-1;
      const ny=Math.max(H*0.22,Math.min(H*0.84,y+dir*amp));
      for(let i=1;i<=5;i++){const t=i/5;const iy=y+(ny-y)*(t*t*(3-2*t));this.pts.push({x:x+seg*t,y:iy+(r()-.5)*5*this.env.roughness});}
      // Objects
      const mx=x+seg*.5, my=y+(ny-y)*.5;
      if(mx>200){
        if(r()<.38){const c=1+Math.floor(r()*3);for(let j=0;j<c;j++)this.objs.push({t:'coin',x:mx+(j-1)*24,y:my-32-r()*28,collected:false});}
        if(r()<.07)this.objs.push({t:'fuel',x:mx,y:my-44,collected:false});
        if(r()<.45)this.decos.push({type:r()<.55?'tree':'rock',x:mx+(r()-.5)*28,y:my,s:11+r()*16});
      }
      x+=seg; y=ny;
    }
    this.genX=x;
  }
  getY(wx){
    const pts=this.pts;
    if(wx<=pts[0].x)return pts[0].y;
    if(wx>=pts[pts.length-1].x)this._gen(wx+W*3);
    let lo=0,hi=pts.length-1;
    while(hi-lo>1){const m=lo+hi>>1;pts[m].x<=wx?lo=m:hi=m;}
    const d=pts[hi].x-pts[lo].x;
    if(d<.001)return pts[lo].y;
    const t=(wx-pts[lo].x)/d;
    return pts[lo].y*(1-t)+pts[hi].y*t;
  }
  getNormal(wx){
    const y0=this.getY(wx-2),y1=this.getY(wx+2);
    const dx=4,dy=y1-y0;
    const l=Math.hypot(dx,dy);
    return{nx:-dy/l,ny:dx/l};
  }
  ensure(toX){if(toX>this.genX-W)this._gen(toX+W*3);}
}

// ─────────────────────────────────────────────────────────
// VEHICLE PHYSICS  (spring-suspension model)
// ─────────────────────────────────────────────────────────
class Car {
  constructor(vd,upg,env,sx,sy){
    this.vd=vd; this.upg=upg; this.env=env;
    const eM=1+upg.engine*.19; const sM=1+upg.susp*.16;
    const tM=1+upg.tires*.12; const fM=1+upg.fuel*.22;
    this.engP  = vd.baseEngine*eM;
    this.springK= 0.32*sM;
    this.dampK  = 0.62*sM;
    this.fric   = env.friction+tM*.03;
    this.fuelMax= vd.baseFuel*fM;
    this.fuel   = this.fuelMax;
    this.mass   = vd.baseMass;
    this.has4wd = upg.fwd>0;
    this.turboL = upg.turbo;
    this.turboCharge=0;
    this.wr=vd.wheelR;
    this.axF=vd.axF; this.axR=vd.axR;
    this.suspRest=this.wr+14+sM*4; // natural spring length

    // Body
    this.bx=sx; this.by=sy; this.bvx=0; this.bvy=0; this.bang=0;
    // Front wheel
    this.fx=sx+this.axF; this.fy=sy+this.suspRest;
    this.fvx=0; this.fvy=0; this.fang=0; this.fGnd=false;
    // Rear wheel
    this.rx=sx+this.axR; this.ry=sy+this.suspRest;
    this.rvx=0; this.rvy=0; this.rang=0; this.rGnd=false;

    this.dist=0; this.startX=sx;
    this.crashed=false; this.crashReason=''; this.flipTimer=0;
    this.outOfFuel=false; this.dead=false;
    this.exhaustTimer=0;
    this.frameN=0;
  }

  step(terrain,gas,brake){
    if(this.dead)return;
    this.frameN++;
    const g=this.env.gravity;
    const FUEL_DRAIN=0.016-this.upg.fuel*.001;

    // Fuel
    if(gas&&this.fuel>0)this.fuel=Math.max(0,this.fuel-FUEL_DRAIN);
    if(this.fuel<=0&&!this.outOfFuel){this.outOfFuel=true;}

    // Turbo charge
    if(this.turboL>0){
      if(gas&&this.fuel>0)this.turboCharge=Math.min(1,this.turboCharge+.003*this.turboL);
      else this.turboCharge*=.97;
    }
    const turboBoost=this.turboCharge>.7?1+this.turboL*.18:1;

    // ─ Spring physics ─────────────────────────────────
    // Get world attachment points (body-angle-aware)
    const c=Math.cos(this.bang), s=Math.sin(this.bang);
    const fAx=this.bx+this.axF*c,  fAy=this.by+this.axF*s;
    const rAx=this.bx+this.axR*c,  rAy=this.by+this.axR*s;

    // Spring+damper on each wheel
    this._spring(fAx,fAy,'f');
    this._spring(rAx,rAy,'r');

    // ─ Gravity ────────────────────────────────────────
    this.bvy+=g/this.mass;
    this.fvy+=g; this.rvy+=g;

    // ─ Engine / Brake ─────────────────────────────────
    const canDrive=this.fuel>0;
    if(canDrive&&gas&&this.rGnd){
      const th=this.engP*turboBoost;
      this.rvx+=th; this.rang+=th/this.wr;
    }
    if(canDrive&&gas&&this.has4wd&&this.fGnd){
      const th=this.engP*.45*turboBoost;
      this.fvx+=th; this.fang+=th/this.wr;
    }
    if(brake){
      if(this.rGnd){this.rvx*=.68; this.rang*=.68;}
      if(this.fGnd){this.fvx*=.78; this.fang*=.78;}
    }

    // ─ Drag ───────────────────────────────────────────
    this.bvx*=.993; this.bvy*=.9998;
    this.fvx*=.993; this.rvx*=.993;

    // ─ Ground collision ───────────────────────────────
    this._ground(terrain,'f');
    this._ground(terrain,'r');

    // ─ Integrate ──────────────────────────────────────
    this.bx+=this.bvx; this.by+=this.bvy;
    this.fx+=this.fvx; this.fy+=this.fvy;
    this.rx+=this.rvx; this.ry+=this.rvy;
    this.fang+=this.fvx/this.wr;
    this.rang+=this.rvx/this.wr;

    // ─ Body angle from wheels ─────────────────────────
    const dx=this.fx-this.rx, dy=this.fy-this.ry;
    const tAng=Math.atan2(dy,dx);
    this.bang+=(tAng-this.bang)*.2;

    // Body can't go below terrain
    const bodyGnd=terrain.getY(this.bx);
    if(this.by>bodyGnd-8){this.by=bodyGnd-8;if(this.bvy>0)this.bvy*=-.25;}

    // Distance
    this.dist=Math.max(0,this.bx-this.startX);

    // Flip detection
    if(Math.abs(this.bang)>Math.PI*.72){
      this.flipTimer++;
      if(this.flipTimer>55){this.crashed=true;this.crashReason='FLIPPED!';}
    } else this.flipTimer=Math.max(0,this.flipTimer-2);
  }

  _spring(ax,ay,s){
    const wx=s==='f'?this.fx:this.rx;
    const wy=s==='f'?this.fy:this.ry;
    const wvx=s==='f'?this.fvx:this.rvx;
    const wvy=s==='f'?this.fvy:this.rvy;
    // Spring vector
    const dx=ax-wx, dy=ay-wy;
    const dist=Math.hypot(dx,dy)||.001;
    const nx=dx/dist, ny=dy/dist;
    // Spring compression from rest
    const comp=this.suspRest-dist;
    const fMag=comp*this.springK;
    // Relative velocity along spring
    const relVx=this.bvx-wvx, relVy=this.bvy-wvy;
    const relV=relVx*nx+relVy*ny;
    const dFmag=relV*this.dampK;
    const fx2=(fMag+dFmag)*nx, fy2=(fMag+dFmag)*ny;
    if(s==='f'){this.fvx+=fx2;this.fvy+=fy2;}
    else{this.rvx+=fx2;this.rvy+=fy2;}
    this.bvx-=fx2/this.mass; this.bvy-=fy2/this.mass;
  }

  _ground(terrain,s){
    let wx=s==='f'?this.fx:this.rx;
    let wy=s==='f'?this.fy:this.ry;
    let wvx=s==='f'?this.fvx:this.rvx;
    let wvy=s==='f'?this.fvy:this.rvy;
    const ty=terrain.getY(wx);
    if(wy+this.wr>ty){
      wy=ty-this.wr;
      // Normal-based reflection
      const nm=terrain.getNormal(wx);
      const dot=wvx*nm.nx+wvy*nm.ny;
      if(dot<0){
        wvx-=(1.2)*dot*nm.nx;
        wvy-=(1.2)*dot*nm.ny;
      }
      wvx*=this.fric; wvy=Math.min(0,wvy);
      if(s==='f'){this.fGnd=true;this.fy=wy;this.fvx=wvx;this.fvy=wvy;}
      else{this.rGnd=true;this.ry=wy;this.rvx=wvx;this.rvy=wvy;}
    } else {
      if(s==='f')this.fGnd=false;
      else this.rGnd=false;
    }
  }
}

function drawWheel(c,x,y,r,ang,vd){
  // Shadow
  c.save();c.globalAlpha=.25;c.fillStyle='#000';c.beginPath();c.ellipse(x+4,y+5,r,r*.5,0,0,Math.PI*2);c.fill();c.restore();
  // Tyre
  c.fillStyle=vd.tyrCol;c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.fill();
  // Tread lines
  c.strokeStyle='rgba(50,50,50,.7)';c.lineWidth=r*.16;
  c.beginPath();c.arc(x,y,r*.9,0,Math.PI*2);c.stroke();
  for(let i=0;i<8;i++){
    const a=ang+i*Math.PI/4;
    c.strokeStyle='rgba(30,30,30,.55)';c.lineWidth=r*.09;
    c.beginPath();c.moveTo(x+Math.cos(a)*r*.76,y+Math.sin(a)*r*.76);
    c.lineTo(x+Math.cos(a)*r*.92,y+Math.sin(a)*r*.92);c.stroke();
  }
  // Rim
  c.fillStyle=vd.rimCol;c.beginPath();c.arc(x,y,r*.52,0,Math.PI*2);c.fill();
  // Spokes
  c.strokeStyle=vd.rimCol;c.lineWidth=r*.1;
  for(let i=0;i<5;i++){const a=ang+i*Math.PI*.4;c.beginPath();c.moveTo(x+Math.cos(a)*r*.12,y+Math.sin(a)*r*.12);c.lineTo(x+Math.cos(a)*r*.48,y+Math.sin(a)*r*.48);c.stroke();}
  // Hub
  c.fillStyle=vd.hubCol;c.beginPath();c.arc(x,y,r*.13,0,Math.PI*2);c.fill();
  c.fillStyle='rgba(255,255,255,.5)';c.beginPath();c.arc(x-r*.04,y-r*.04,r*.05,0,Math.PI*2);c.fill();
}

function drawSuspension(c,bx,by,bang,axOff,wx,wy,col='#888'){
  const cx2=Math.cos(bang),sy2=Math.sin(bang);
  const ax=bx+axOff*cx2, ay=by+axOff*sy2;
  c.strokeStyle=col;c.lineWidth=3.5;c.lineCap='round';
  c.beginPath();c.moveTo(ax,ay);c.lineTo(wx,wy);c.stroke();
  // Spring coils visual
  c.strokeStyle='rgba(100,100,100,.5)';c.lineWidth=1.5;
  const dx=wx-ax,dy=wy-ay,len=Math.hypot(dx,dy);
  const nx2=dx/len,ny2=dy/len,px=-ny2,py=nx2;
  const coils=4,amp=4;
  c.beginPath();c.moveTo(ax,ay);
  for(let i=1;i<=coils*2;i++){
    const t=i/(coils*2);
    const sign=(i%2===0?1:-1);
    c.lineTo(ax+dx*t+px*amp*sign,ay+dy*t+py*amp*sign);
  }
  c.lineTo(wx,wy);c.stroke();
}

function drawCarBody(c,car,ox,oy){
  const vd=car.vd;
  c.save();
  c.translate(ox,oy);
  c.rotate(car.bang);

  const chW=vd.chW,chH=vd.chH;

  if(vd.id==='bike'){
    drawBikeBody(c,vd,chW,chH);
  } else if(vd.id==='monster'){
    drawMonsterBody(c,vd,chW,chH);
  } else if(vd.id==='pickup'){
    drawPickupBody(c,vd,chW,chH);

    drawJeepBody(c,vd,chW,chH);
  }
  c.restore();
}

  // Window divider
  c.strokeStyle=vd.bodyCol2;c.lineWidth=2;c.beginPath();c.moveTo(hw*.14,-h);c.lineTo(hw*.14,-h*1.82);c.stroke();
  // Highlight
  c.fillStyle='rgba(255,255,255,.12)';c.beginPath();c.roundRect(-hw,-h,w,h*.38,4);c.fill();
  // Hood
  c.strokeStyle='rgba(0,0,0,.3)';c.lineWidth=1.5;c.beginPath();c.moveTo(hw*.5,-h);c.lineTo(hw,-h*.45);c.stroke();
  // Headlight
  const hl=c.createRadialGradient(hw+1,-h*.12,0,hw+1,-h*.12,9);
  hl.addColorStop(0,'rgba(255,255,180,.9)');hl.addColorStop(1,'rgba(255,255,180,0)');
  c.fillStyle=hl;c.beginPath();c.arc(hw+1,-h*.12,9,0,Math.PI*2);c.fill();
  c.fillStyle='rgba(255,255,200,.95)';c.beginPath();c.roundRect(hw-2,-h*.3,6,h*.35,2);c.fill();
  // Outline

  c.fillStyle=g;

  c.fillStyle=vd.winCol;

function drawMonsterBody(c,vd,w,h){

  // Cab
  c.fillStyle=g;
  c.beginPath();c.moveTo(-hw*.38,-h);c.lineTo(hw*.38,-h);c.lineTo(hw*.26,-h*1.9);c.lineTo(-hw*.26,-h*1.9);c.closePath();c.fill();
  c.fillStyle=vd.winCol;

function drawBikeBody(c,vd,w,h){
  const hw=w/2;
  // Frame
  c.strokeStyle=vd.bodyCol;c.lineWidth=7;c.lineCap='round';
  c.beginPath();c.moveTo(hw,-6);c.lineTo(-hw,-6);c.stroke();
  c.beginPath();c.moveTo(0,-6);c.lineTo(-hw*.08,-h*1.55);c.stroke();
  c.beginPath();c.moveTo(-hw*.08,-h*1.55);c.lineTo(hw,-6);c.stroke();
  // Engine
  c.fillStyle=vd.bodyCol2;c.beginPath();c.roundRect(-hw*.25,-h*.95,hw*.5,h*.65,3);c.fill();
  c.fillStyle='rgba(255,255,255,.1)';c.beginPath();c.roundRect(-hw*.25,-h*.95,hw*.5,h*.25,3);c.fill();
  // Fairing
  const fg=c.createLinearGradient(0,-h*1.6,0,-6);fg.addColorStop(0,vd.bodyCol);fg.addColorStop(1,vd.bodyCol2);
  c.fillStyle=fg;
  c.beginPath();c.moveTo(hw,-6);c.lineTo(hw*1.25,-h*.7);c.lineTo(hw,-h*1.55);c.lineTo(hw*.4,-h*1.55);c.lineTo(hw*.4,-6);c.closePath();c.fill();
  c.strokeStyle='rgba(0,0,0,.3)';c.lineWidth=1.5;c.stroke();
  // Seat
  const sg=c.createLinearGradient(-hw*.8,-h*1.9,hw*.4,-h*1.5);sg.addColorStop(0,'#222');sg.addColorStop(1,'#444');
  c.fillStyle=sg;c.beginPath();c.roundRect(-hw*.8,-h*1.88,hw*1.2,h*.38,5);c.fill();
  // Headlight
  c.fillStyle='rgba(255,255,200,.95)';c.beginPath();c.arc(hw*1.2,-h*.9,7,0,Math.PI*2);c.fill();

  hl.addColorStop(0,'rgba(255,255,180,.5)');hl.addColorStop(1,'rgba(255,255,180,0)');
  c.fillStyle=hl;c.beginPath();c.arc(hw*1.2,-h*.9,14,0,Math.PI*2);c.fill();
}

// ─────────────────────────────────────────────────────────
// BACKGROUND RENDERER
// ─────────────────────────────────────────────────────────
function drawBackground(env,camX,camY,clouds){
  // Sky gradient
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,env.sky[0]);g.addColorStop(1,env.sky[1]);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  // Stars (moon only)
  if(env.id==='moon'){
    ctx.fillStyle='rgba(255,255,255,.8)';
    const sr=rng32(77);
    for(let i=0;i<90;i++){ctx.beginPath();ctx.arc(sr()*W,sr()*H*.75,sr()*1.2+.3,0,Math.PI*2);ctx.fill();}
    const eg=ctx.createRadialGradient(W*.78,H*.1,0,W*.78,H*.1,30);
    eg.addColorStop(0,'#4488cc');eg.addColorStop(.7,'#2255aa');eg.addColorStop(1,'#112244');
    ctx.fillStyle=eg;ctx.beginPath();ctx.arc(W*.78,H*.1,30,0,Math.PI*2);ctx.fill();
  }

  // Clouds
  if(env.id!=='moon'&&clouds){
    ctx.fillStyle=env.cloudColor;
    for(const cl of clouds){
      const cx=(cl.x-camX*cl.spd)%W+((cl.x-camX*cl.spd)<0?W:0);
      const cy=cl.y-camY*.06;
      ctx.save();ctx.globalAlpha=cl.a;
      for(const b of cl.blobs){ctx.beginPath();ctx.arc(cx+b.dx,cy+b.dy,b.r,0,Math.PI*2);ctx.fill();}
      ctx.restore();
    }
  }

  // Parallax bg hills
  for(let li=0;li<3;li++){
    const spd=0.12+li*.16;
    const offX=(-(camX*spd))%W;
    ctx.fillStyle=env.bgHillColor[li];
    ctx.beginPath();
    for(let px=0;px<=W+80;px+=35){
      const hx=offX+px;
      const hy=H*(0.38+li*.09)-Math.sin(hx*.008+li*1.2)*H*(0.14-li*.02)-Math.sin(hx*.018+li*2.1)*H*.05;
      px===0?ctx.moveTo(hx,hy):ctx.lineTo(hx,hy);
    }
    ctx.lineTo(W+100,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();
  }

  // Sun / moon orb
  if(env.id==='moon'){
    const sg=ctx.createRadialGradient(W*.15,H*.08,0,W*.15,H*.08,45);
    sg.addColorStop(0,'rgba(200,200,180,.7)');sg.addColorStop(1,'rgba(180,180,160,0)');
    ctx.fillStyle=sg;ctx.beginPath();ctx.arc(W*.15,H*.08,45,0,Math.PI*2);ctx.fill();
  } else {
    const sg=ctx.createRadialGradient(W*.82,H*.08,0,W*.82,H*.08,55);
    sg.addColorStop(0,'rgba(255,240,160,.95)');sg.addColorStop(.5,'rgba(255,210,80,.5)');sg.addColorStop(1,'rgba(255,180,40,0)');
    ctx.fillStyle=sg;ctx.beginPath();ctx.arc(W*.82,H*.08,55,0,Math.PI*2);ctx.fill();
  }
}

function drawTerrain(terrain,env,camX,camY){
  const pts=terrain.pts;
  // Find first visible point
  let si=0;
  for(let i=0;i<pts.length-1;i++){if(pts[i].x-camX>-SEG*2){si=Math.max(0,i-2);break;}}

  // Underground depth gradient
  const dg=ctx.createLinearGradient(0,H*.4,0,H);
  dg.addColorStop(0,env.groundMid);dg.addColorStop(1,env.groundDeep);

  // Ground polygon
  ctx.beginPath();
  ctx.moveTo(pts[si].x-camX,H+60);
  for(let i=si;i<pts.length&&pts[i].x-camX<W+SEG*2;i++){
    ctx.lineTo(pts[i].x-camX,pts[i].y-camY);
  }
  ctx.lineTo(W+100,H+60);ctx.closePath();
  ctx.fillStyle=dg;ctx.fill();

  // Top soil layer
  ctx.beginPath();
  for(let i=si;i<pts.length&&pts[i].x-camX<W+SEG*2;i++){
    const px=pts[i].x-camX,py=pts[i].y-camY;
    i===si?ctx.moveTo(px,py):ctx.lineTo(px,py);
  }
  const tg=ctx.createLinearGradient(0,0,0,H*.15);
  tg.addColorStop(0,env.groundTop);tg.addColorStop(1,env.groundMid);
  ctx.strokeStyle=env.groundTop;ctx.lineWidth=10;ctx.lineJoin='round';ctx.stroke();

  // Grass / surface detail line
  ctx.strokeStyle=env.grassStroke;ctx.lineWidth=3;ctx.lineCap='round';
  ctx.beginPath();
  for(let i=si;i<pts.length&&pts[i].x-camX<W+SEG*2;i++){
    const px=pts[i].x-camX,py=pts[i].y-camY;
    i===si?ctx.moveTo(px,py):ctx.lineTo(px,py);
  }
  ctx.stroke();

  // Decorations
  for(const d of terrain.decos){
    const dx=d.x-camX,dy=d.y-camY;
    if(dx<-60||dx>W+60)continue;
    if(d.type==='tree'){
      const fn=DECO_FNS.tree[env.id]||drawTreeGreen;
      fn(ctx,dx,dy,d.s);
    } else {
      drawRock(ctx,dx,dy,d.s,env);
    }
  }
}

function drawObjects(terrain,camX,camY,t){
  for(const o of terrain.objs){
    if(o.collected)continue;
    const ox=o.x-camX,oy=o.y-camY;
    if(ox<-30||ox>W+30)continue;
    if(o.t==='coin'){
      const pulse=.94+Math.sin(t*.006+o.x*.05)*.06;
      const r=9*pulse;
      const cg=ctx.createRadialGradient(ox-2,oy-2,0,ox,oy,r);
      cg.addColorStop(0,'#fff8a0');cg.addColorStop(.5,'#ffe500');cg.addColorStop(1,'#cc8800');
      ctx.fillStyle=cg;ctx.beginPath();ctx.arc(ox,oy,r,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#aa7700';ctx.lineWidth=2;ctx.beginPath();ctx.arc(ox,oy,r,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle='rgba(180,120,0,.8)';ctx.font=`bold ${(r*1.1)|0}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('$',ox,oy+.5);
      // Sparkle
      if(Math.sin(t*.01+o.x)>.7){ctx.fillStyle='rgba(255,255,200,.7)';ctx.beginPath();ctx.arc(ox-r*.5,oy-r*.5,2,0,Math.PI*2);ctx.fill();}
    } else {
      // Fuel can
      ctx.fillStyle='#f44336';ctx.beginPath();ctx.roundRect(ox-9,oy-20,18,20,3);ctx.fill();
      ctx.fillStyle='#b71c1c';ctx.beginPath();ctx.roundRect(ox-5,oy-24,10,6,2);ctx.fill();
      ctx.fillStyle='#ef9a9a';ctx.beginPath();ctx.roundRect(ox-6,oy-17,5,5,1);ctx.fill();
      ctx.strokeStyle='#880000';ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(ox-9,oy-20,18,20,3);ctx.stroke();
      // Glow
      const fg=ctx.createRadialGradient(ox,oy,0,ox,oy,22);fg.addColorStop(0,'rgba(255,100,0,.25)');fg.addColorStop(1,'transparent');
      ctx.fillStyle=fg;ctx.beginPath();ctx.arc(ox,oy,22,0,Math.PI*2);ctx.fill();
    }
  }
}

function drawVehicle(car,camX,camY){
  const bsx=car.bx-camX, bsy=car.by-camY;
  const fsx=car.fx-camX, fsy=car.fy-camY;
  const rsx=car.rx-camX, rsy=car.ry-camY;

  // Rear wheel
  drawWheel(ctx,rsx,rsy,car.wr,car.rang,car.vd);
  // Suspensions
  drawSuspension(ctx,bsx,bsy,car.bang,car.axF,fsx,fsy);
  drawSuspension(ctx,bsx,bsy,car.bang,car.axR,rsx,rsy);
  // Front wheel (on top of susp line)
  drawWheel(ctx,fsx,fsy,car.wr,car.fang,car.vd);
  // Body
  drawCarBody(ctx,car,bsx,bsy);

  // Turbo glow
  if(car.turboCharge>.7){
    const tg=ctx.createRadialGradient(bsx,bsy,0,bsx,bsy,55);
    tg.addColorStop(0,'rgba(0,200,255,.2)');tg.addColorStop(1,'transparent');
    ctx.fillStyle=tg;ctx.beginPath();ctx.arc(bsx,bsy,55,0,Math.PI*2);ctx.fill();
  }
}

function makeClouds(){
  const r=rng32(123); const cls=[];
  for(let i=0;i<8;i++){
    const blobs=[];
    const n=2+Math.floor(r()*3);
    for(let j=0;j<n;j++)blobs.push({dx:(j-.5)*30,dy:(r()-.3)*14,r:18+r()*18});
    cls.push({x:r()*W*3,y:H*.08+r()*H*.18,spd:.15+r()*.2,a:.5+r()*.4,blobs});
  }
  return cls;
}

  drawSuspension(c,0,0,0,-vd.axR,-vd.axR,wr+car_suspRest(vd));
  drawSuspension(c,0,0,0,vd.axF,vd.axF,wr+car_suspRest(vd));

    const cd=document.createElement('div');cd.className='upg-card';
    let dots='';for(let i=0;i<up.maxL;i++)dots+=`<div class="upg-dot${i<lvl?' on':''}"></div>`;
    cd.innerHTML=`<div class="upg-icon">${up.icon}</div><div class="upg-name">${up.name}</div><div class="upg-dots">${dots}</div>${maxed?'<div class="upg-cost" style="color:rgba(255,200,0,.4);font-size:9px">MAX</div>':'<div class="upg-cost" style="opacity:'+(sv.coins>=cost?.9:.35)+'">'+(vSv.locked?'🔒':'🪙'+cost)+'</div>'}`;
    if(!maxed&&!vSv.locked){
      cd.addEventListener('click',()=>{
        const c2=Math.round(up.base*Math.pow(up.mult,sv.vs[sv.selV][up.id]||0));
        if(sv.coins>=c2){sv.coins-=c2;sv.vs[sv.selV][up.id]=(sv.vs[sv.selV][up.id]||0)+1;saveSv();sfxBuy();refreshGarage();}
        else{toast('Need 🪙'+c2);beep(220,.2,.3,'sawtooth');}
      });
    }
    ug.appendChild(cd);
  }
}

// ─────────────────────────────────────────────────────────
// GAME START
// ─────────────────────────────────────────────────────────
function startGame(){
  if(raf){cancelAnimationFrame(raf);raf=null;}
  STATE='game';
  sessionCoins=0; frameT=0; gas=false; brake=false; paused=false;
  PARTS.length=0;
  nextMiles=0;

  const env=ENVS.find(e=>e.id===sv.selE)||ENVS[0];
  const vd=VEHICLES.find(v=>v.id===sv.selV)||VEHICLES[0];
  const vSv=sv.vs[vd.id];
  const upg={engine:vSv.engine||0,susp:vSv.susp||0,fuel:vSv.fuel||0,tires:vSv.tires||0,fwd:vSv.fwd||0,turbo:vSv.turbo||0};

  terrain=new Terrain(env,Math.random()*99999|0);
  clouds=makeClouds();

  const startY=terrain.getY(180)-vd.wheelR-68;
  car=new Car(vd,upg,env,180,startY);

  // Camera: keep vehicle at 35% from left, 60% from top
  camX=car.bx-W*.35;
  camY=car.by-H*.6;

  showScr('game');
  document.getElementById('pauseScr').classList.remove('on');
  document.getElementById('goScr').classList.remove('on');

  startEng();
  lastT=performance.now();
  raf=requestAnimationFrame(loop);
}

// ─────────────────────────────────────────────────────────
// MAIN LOOP
// ─────────────────────────────────────────────────────────
function loop(now){
  if(STATE!=='game'||paused)return;
  raf=requestAnimationFrame(loop);
  const dt=Math.min((now-lastT)/1000,.05); lastT=now; frameT+=dt;
  const t=now;

  // Physics substeps
  const steps=Math.max(1,Math.round(dt*60));
  for(let i=0;i<steps;i++){
    if(!car.dead)car.step(terrain,gas,brake);
    updateParts();
  }

  // Out of fuel crash
  if(car.outOfFuel&&!car.crashed&&!car.dead){car.crashed=true;car.crashReason='OUT OF FUEL!';}

  // Exhaust particles
  car.exhaustTimer++;
  if(!car.dead&&gas&&car.exhaustTimer%3===0){
    const c=Math.cos(car.bang),s=Math.sin(car.bang);
    const ex=car.bx+car.axR*c, ey=car.by+car.axR*s;
    emitParts(ex,ey,2,{angle:car.bang+Math.PI+(Math.random()-.5)*.5,speed:2+Math.random()*1.8,
      decay:.04+Math.random()*.02,r:3+Math.random()*3,
      col:car.turboCharge>.7?'rgba(0,200,255,.7)':`rgba(${160+Math.random()*40|0},${100+Math.random()*30|0},60,.7)`,
      g:.04,up:.5});
  }
  // Wheel dust
  if((car.rGnd||car.fGnd)&&Math.abs(car.rvx)>2.5&&car.exhaustTimer%5===0){
    const wx=car.rGnd?car.rx:car.fx, wy=car.rGnd?car.ry:car.fy;
    emitParts(wx,wy+car.wr,2,{angle:-Math.PI/2+(Math.random()-.5)*.9,speed:.8+Math.random()*1.5,decay:.055,r:2+Math.random()*3,col:car.env.groundTop,g:-.01,up:1});
  }

  // Coin / fuel collection
  const cBodies=[{x:car.fx,y:car.fy},{x:car.rx,y:car.ry},{x:car.bx,y:car.by}];
  for(const o of terrain.objs){
    if(o.collected)continue;
    for(const b of cBodies){
      const d2=(b.x-o.x)**2+(b.y-o.y)**2;
      const rad=o.t==='coin'?9+car.wr*1.1:14+car.wr*1.1;
      if(d2<rad*rad){
        o.collected=true;
        if(o.t==='coin'){
          sessionCoins++;sfxCoin();
          // Floating +1
          const pop=document.createElement('div');
          pop.className='cpop';pop.textContent='+1';
          pop.style.left=(o.x-camX-12)+'px';pop.style.top=(o.y-camY-16)+'px';
          document.getElementById('ui').appendChild(pop);
          setTimeout(()=>pop.remove(),920);
          emitParts(o.x,o.y,5,{speed:2.2,decay:.055,r:3,col:'#ffe500',g:.05,up:1,spread:Math.PI*2});
        } else {
          car.fuel=Math.min(car.fuelMax,car.fuel+car.fuelMax*.5);car.outOfFuel=false;
          sfxFuel();toast('⛽ FUEL +50%');
          emitParts(o.x,o.y,7,{speed:2.5,decay:.04,r:3,col:'#ff6600',g:.03,up:1.5,spread:Math.PI*2});
        }
        break;
      }
    }
  }

  // Camera — smooth follow, vehicle at ~35% from left, 60% from top
  const tCamX=car.bx-W*.35;
  const tCamY=car.by-H*.6;
  camX+=(tCamX-camX)*.1;
  camY+=(tCamY-camY)*.1;
  terrain.ensure(camX+W*2);

  // Milestones
  const d=car.dist|0;
  if(nextMiles<MILESTONES.length&&d>=MILESTONES[nextMiles]){
    showMile(MILESTONES[nextMiles]);nextMiles++;
    // Environment unlocks
    ENVS.forEach(e=>{if(d>=e.unlockM&&!sv.envs[e.id]){sv.envs[e.id]=true;saveSv();setTimeout(()=>toast('🗺 '+e.name+' UNLOCKED!'),2000);}});
  }

  // Engine pitch
  setRPM(Math.min(1,Math.abs(car.bvx)/14+(gas?.28:0)));

  // Update HUD
  document.getElementById('hDist').textContent=(car.dist|0)+' m';
  document.getElementById('hCoins').textContent=sessionCoins;
  const fp=(car.fuel/car.fuelMax)*100;
  const fb=document.getElementById('fuelBar');
  fb.style.width=fp+'%';
  fb.style.background=fp<20?'linear-gradient(90deg,#f44336,#b71c1c)':fp<40?'linear-gradient(90deg,#ff9800,#e65100)':'linear-gradient(90deg,#66bb6a,#2e7d32)';

  // ─ RENDER ─────────────────────────────────────────────
  ctx.clearRect(0,0,W,H);
  drawBackground(car.env,camX,camY,clouds);
  drawTerrain(terrain,car.env,camX,camY);
  drawObjects(terrain,camX,camY,t);
  drawParts(camX,camY);
  if(!car.dead)drawVehicle(car,camX,camY);

  // Vignette
  const vg=ctx.createRadialGradient(W/2,H/2,H*.3,W/2,H/2,H*.8);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.4)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

  // CRASH
  if(car.crashed&&!car.dead){
    car.dead=true;stopEng();sfxCrash();
    emitParts(car.bx,car.by,18,{speed:4.5,decay:.022,r:6,col:'#ff3300',g:.1,up:3,spread:Math.PI*2});
    emitParts(car.bx,car.by,12,{speed:3,decay:.028,r:4,col:'#ff9800',g:.08,up:2,spread:Math.PI*2});
    emitParts(car.bx,car.by,8,{speed:2,decay:.035,r:3,col:'#fff',g:.06,up:1.5,spread:Math.PI*2});
    setTimeout(()=>endGame(car.crashReason||'CRASHED!'),1000);
  }
}

function endGame(reason){
  STATE='gameover';
  if(raf){cancelAnimationFrame(raf);raf=null;}
  const d=car.dist|0;
  sv.coins+=sessionCoins;
  const nb=d>sv.best;if(nb)sv.best=d;
  // Unlock envs from best distance
  ENVS.forEach(e=>{if(sv.best>=e.unlockM)sv.envs[e.id]=true;});
  saveSv();
  document.getElementById('goScr').classList.add('on');
  document.getElementById('goReason').textContent=reason;
  document.getElementById('goDist').textContent=d+' m';
  document.getElementById('goCoins').textContent=sessionCoins;
  document.getElementById('goBest').textContent=nb?'🏆 NEW BEST: '+d+' m!':'BEST: '+sv.best+' m';
}

// ─────────────────────────────────────────────────────────
// TOAST & MILESTONE
// ─────────────────────────────────────────────────────────
let toastT=null;
function toast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.style.opacity='1';
  if(toastT)clearTimeout(toastT);
  toastT=setTimeout(()=>el.style.opacity='0',2000);
}
let mileT=null;
function showMile(m){
  sfxMile();
  const el=document.getElementById('mile');
  document.getElementById('mileN').textContent=m+'m';
  el.style.opacity='1';
  if(mileT)clearTimeout(mileT);
  mileT=setTimeout(()=>el.style.opacity='0',2200);
}

// ─────────────────────────────────────────────────────────
// INPUT
// ─────────────────────────────────────────────────────────
const cGasEl=document.getElementById('cGas');
const cBrEl=document.getElementById('cBrake');
function setGas(v){gas=v;cGasEl.classList.toggle('act',v);}
function setBrake(v){brake=v;cBrEl.classList.toggle('act',v);}

cGasEl.addEventListener('touchstart',e=>{e.preventDefault();setGas(true);ac();},{passive:false});
cGasEl.addEventListener('touchend',  e=>{e.preventDefault();setGas(false);},{passive:false});
cBrEl.addEventListener('touchstart', e=>{e.preventDefault();setBrake(true);ac();},{passive:false});
cBrEl.addEventListener('touchend',   e=>{e.preventDefault();setBrake(false);},{passive:false});
cGasEl.addEventListener('mousedown', ()=>setGas(true));
cGasEl.addEventListener('mouseup',   ()=>setGas(false));
cGasEl.addEventListener('mouseleave',()=>setGas(false));
cBrEl.addEventListener('mousedown',  ()=>setBrake(true));
cBrEl.addEventListener('mouseup',    ()=>setBrake(false));
cBrEl.addEventListener('mouseleave', ()=>setBrake(false));

window.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='d'){setGas(true);ac();}
  if(e.key==='ArrowLeft'||e.key==='a'){setBrake(true);ac();}
  if(e.key==='Escape'||e.key==='p')togglePause();
});
window.addEventListener('keyup',e=>{
  if(e.key==='ArrowRight'||e.key==='d')setGas(false);
  if(e.key==='ArrowLeft'||e.key==='a')setBrake(false);
});

function togglePause(){
  if(STATE!=='game')return;
  paused=!paused;
  document.getElementById('pauseScr').classList.toggle('on',paused);
  if(!paused){lastT=performance.now();startEng();raf=requestAnimationFrame(loop);}
  else stopEng();
}

// ─────────────────────────────────────────────────────────
// BUTTONS
// ─────────────────────────────────────────────────────────
document.getElementById('btnPlay').onclick=()=>{sfxBtn();ac();startGame();};
document.getElementById('btnGarage').onclick=()=>{sfxBtn();initGarage();};
document.getElementById('btnLevelSel').onclick=()=>{sfxBtn();initLvlSel();};
document.getElementById('btnLBack').onclick=()=>{sfxBtn();initMenu();};
document.getElementById('btnGBack').onclick=()=>{sfxBtn();initMenu();};
document.getElementById('btnResume').onclick=togglePause;
document.getElementById('btnPMenu').onclick=()=>{paused=false;stopEng();if(raf){cancelAnimationFrame(raf);raf=null;}initMenu();};
document.getElementById('btnRetry').onclick=()=>{sfxBtn();startGame();};
document.getElementById('btnGOMenu').onclick=()=>{sfxBtn();initMenu();};
// Pause button (tap center-top of HUD area on mobile)
document.getElementById('hud').addEventListener('click',e=>{if(STATE==='game'&&e.target===document.getElementById('hud'))togglePause();});

// SERVICE WORKER
// ─────────────────────────────────────────────────────────
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').catch(()=>{});});}

// ─────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────
initMenu();
</script>
